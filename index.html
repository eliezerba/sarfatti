                                        {dendrogram.labels.map((lb, i) => (
                                            <line key={`st-${i}`} x1={lb.x} y1={dendrogram.yLeaf} x2={lb.x} y2={lb.y - 4} stroke="#cbd5e1" strokeWidth="1" />
                                        ))}
                                        {dendrogram.labels.map((lb, i) => (
                                            <g key={`lb-${i}`}>
                                                <rect x={lb.x - 72} y={lb.y} width="144" height="34" rx="6" fill="#f8fafc" stroke="#e2e8f0" />
                                                <text x={lb.x} y={lb.y + 12} fontSize="10" fill="#0f172a" textAnchor="middle">{lb.l1}</text>
                                                {lb.l2 && <text x={lb.x} y={lb.y + 24} fontSize="9" fill="#64748b" textAnchor="middle">{lb.l2}</text>}
                                            </g>
                                        ))}
                                    </svg>
                                    <div className="text-[10px] text-slate-500 mt-2 leading-relaxed">
                                        {lang === 'en'
                                            ? 'Method: agglomerative average-linkage (UPGMA). Distance is 1 - Jaccard of tokens. Each step merges the closest pair of clusters using average pair distance. Higher branches represent larger textual distance.'
                                            : 'שיטה: אשכול היררכי מסוג average-linkage (UPGMA). המרחק הוא 1 פחות Jaccard של אוצר המילים. בכל צעד ממזגים את שני האשכולות הקרובים ביותר לפי ממוצע המרחקים ביניהם. ענפים גבוהים יותר מציינים מרחק טקסטואלי גדול יותר.'}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
}

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */
function TextsTabV2({ textsData, textsAudit, orderData, lang, jumpStory }) {
    const [textsInnerTab, setTextsInnerTab] = useState('stories');
    const [treeBasis, setTreeBasis] = useState('story');
    const [selectedStory, setSelectedStory] = useState(null);
    const [selectedKeys, setSelectedKeys] = useState([]);
    const [baseSynopsisKey, setBaseSynopsisKey] = useState('');
    const [treeZoom, setTreeZoom] = useState(1);
    const [msReadKey, setMsReadKey] = useState('');
    const [selectedSegIdx, setSelectedSegIdx] = useState(null);
    const [showSupplements, setShowSupplements] = useState(true);
    const [showCorrections, setShowCorrections] = useState(true);

    const storyNames = useMemo(() => {
        const m = {};
        orderData.forEach(r => {
            if (r.sarfattiNum == null) return;
            const name = (r.storyName || r.storyNameRaw || r.incipit || '').trim();
            if (!name) return;
            if (!m[r.sarfattiNum]) m[r.sarfattiNum] = name;
        });
        return m;
    }, [orderData]);

    const storyNums = useMemo(() =>
        [...new Set(textsData.map(t => t.storyNum).filter(n => n != null))].sort((a, b) => a - b),
    [textsData]);

    const msList = useMemo(() => {
        const seen = new Set();
        const out = [];
        textsData.forEach(t => {
            const key = t.key || msKey(t.library, t.number);
            if (seen.has(key)) return;
            seen.add(key);
            out.push({ key, library: t.library, number: t.number, edition: t.edition || '' });
        });
        return out;
    }, [textsData]);

    const sheetAuditRows = useMemo(() => {
        const sheets = textsAudit?.sheets || [];
        return sheets.map(s => ({
            sheetId: s.sheetId,
            keptRows: s.keptRows,
            totalRows: s.totalRows,
            footnoteRows: s.droppedReasons?.footnoteRow || 0,
        }));
    }, [textsAudit]);

    useEffect(() => {
        setSelectedKeys(prev => {
            const valid = prev.filter(k => msList.some(m => m.key === k));
            if (valid.length) return valid;
            return msList.map(m => m.key);
        });
    }, [msList]);

    useEffect(() => {
        if (selectedStory == null && storyNums.length) setSelectedStory(storyNums[0]);
    }, [selectedStory, storyNums]);

    useEffect(() => {
        if (textsInnerTab === 'stories') setTreeBasis('story');
    }, [textsInnerTab, selectedStory]);

    useEffect(() => {
        if (textsInnerTab === 'map') setTreeBasis('global');
    }, [textsInnerTab]);

    useEffect(() => {
        if (jumpStory == null) return;
        const target = Number(jumpStory);
        if (!Number.isFinite(target)) return;
        setTextsInnerTab('stories');
        setSelectedStory(target);
        setSelectedSegIdx(0);
        setMsReadKey('');

        const keys = [];
        const seen = new Set();
        textsData.forEach(t => {
            if (t.storyNum !== target) return;
            if (!String(t.text || '').trim()) return;
            const key = t.key || msKey(t.library, t.number);
            if (seen.has(key)) return;
            seen.add(key);
            keys.push(key);
        });
        if (keys.length) setSelectedKeys(keys);
    }, [jumpStory, textsData]);

    const textsByMs = useMemo(() => {
        const out = {};
        textsData.forEach(t => {
            const key = t.key || msKey(t.library, t.number);
            if (!out[key]) out[key] = {};
            if (!out[key][t.storyNum]) out[key][t.storyNum] = { sections: {}, notes: {} };
            out[key][t.storyNum].sections[t.sectionNum] = { text: t.text || '' };
            out[key][t.storyNum].notes = { ...(out[key][t.storyNum].notes || {}), ...(t.notes || {}) };
        });
        Object.values(out).forEach(byStory => {
            Object.values(byStory).forEach(entry => {
                entry.sectionNums = Object.keys(entry.sections).map(Number).sort((a, b) => a - b);
                entry.fullText = entry.sectionNums.map(num => entry.sections[num]?.text || '').filter(Boolean).join(' ');
            });
        });
        return out;
    }, [textsData]);

    const selectedMs = useMemo(() =>
        msList.filter(ms => selectedKeys.includes(ms.key)),
    [msList, selectedKeys]);

    const storySectionNums = useMemo(() => {
        if (selectedStory == null) return [];
        const nums = new Set();
        selectedMs.forEach(ms => {
            const entry = textsByMs[ms.key]?.[selectedStory];
            (entry?.sectionNums || []).forEach(num => nums.add(num));
        });
        return [...nums].sort((a, b) => a - b);
    }, [selectedStory, selectedMs, textsByMs]);

    const synopsisRows = useMemo(() => {
        if (selectedStory == null) return [];
        return selectedMs
            .map(ms => ({
                ...ms,
                text: textsByMs[ms.key]?.[selectedStory]?.fullText || '',
                notes: textsByMs[ms.key]?.[selectedStory]?.notes || {},
            }))
            .filter(x => x.text);
    }, [selectedStory, selectedMs, textsByMs]);

    useEffect(() => {
        if (!synopsisRows.length) {
            setBaseSynopsisKey('');
            return;
        }
        if (!baseSynopsisKey || !synopsisRows.some(r => r.key === baseSynopsisKey)) {
            setBaseSynopsisKey(synopsisRows[0].key);
        }
    }, [synopsisRows, baseSynopsisKey]);

    const synopsisByKey = useMemo(() => {
        const m = {};
        synopsisRows.forEach(r => { m[r.key] = r.text; });
        return m;
    }, [synopsisRows]);

    const synopsisNotesByKey = useMemo(() => {
        const m = {};
        synopsisRows.forEach(r => { m[r.key] = r.notes || {}; });
        return m;
    }, [synopsisRows]);

    const synopsisTableRows = useMemo(() => {
        if (selectedStory == null) return [];
        return storySectionNums.map((sectionNum, idx) => ({
            segIdx: idx,
            storyNum: selectedStory,
            sectionNum,
            cells: selectedMs.map(ms => ({
                key: ms.key,
                text: textsByMs[ms.key]?.[selectedStory]?.sections?.[sectionNum]?.text || '',
                notes: textsByMs[ms.key]?.[selectedStory]?.notes || {},
            })),
        }));
    }, [selectedStory, storySectionNums, selectedMs, textsByMs]);

    useEffect(() => {
        if (!synopsisTableRows.length) {
            if (selectedSegIdx != null) setSelectedSegIdx(null);
            return;
        }
        if (selectedSegIdx == null || selectedSegIdx >= synopsisTableRows.length) {
            setSelectedSegIdx(0);
        }
    }, [synopsisTableRows, selectedSegIdx]);

    useEffect(() => {
        if (selectedSegIdx == null) return;
        const el = document.querySelector(`[data-seg-idx="${selectedSegIdx}"]`);
        if (el && el.scrollIntoView) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }, [selectedSegIdx]);

    const baseFullDiff = useMemo(() => {
        if (!baseSynopsisKey) return [];
        const baseText = synopsisByKey[baseSynopsisKey] || '';
        return synopsisRows
            .filter(r => r.key !== baseSynopsisKey)
            .map(r => ({ ...r, ...textDiffProfile(baseText, r.text || ''), ...wordLevelWitnessDiff(baseText, r.text || '') }))
            .sort((a, b) => b.score - a.score);
    }, [baseSynopsisKey, synopsisByKey, synopsisRows]);

    const msSequentialRows = useMemo(() => {
        return selectedMs.map(ms => {
            const seq = storyNums
                .map(num => ({
                    num,
                    text: textsByMs[ms.key]?.[num]?.fullText || '',
                    notes: textsByMs[ms.key]?.[num]?.notes || {},
                }))
                .filter(x => x.text);
            return { ...ms, seq };
        });
    }, [selectedMs, storyNums, textsByMs]);

    const msReadRow = useMemo(() => (
        msSequentialRows.find(ms => ms.key === msReadKey) || null
    ), [msSequentialRows, msReadKey]);

    useEffect(() => {
        if (msReadKey && !selectedKeys.includes(msReadKey)) setMsReadKey('');
    }, [msReadKey, selectedKeys]);

    const pairDist = useMemo(() => {
        const dStory = {};
        const dGlobal = {};
        const keyAt = idx => selectedMs[idx]?.key;
        const globalCorpus = {};
        selectedMs.forEach(ms => {
            globalCorpus[ms.key] = storyNums
                .map(num => textsByMs[ms.key]?.[num]?.fullText || '')
                .filter(Boolean)
                .join(' ');
        });
        for (let i = 0; i < selectedMs.length; i++) {
            for (let j = i + 1; j < selectedMs.length; j++) {
                const ki = keyAt(i), kj = keyAt(j);
                // Use string-sorted key to match the ordering used by all getDist lookups.
                const pairKey = ki < kj ? `${ki}||${kj}` : `${kj}||${ki}`;
                let storyDist;
                if (selectedStory == null) {
                    // No specific story selected – average distance across all stories.
                    let s = 0, c = 0;
                    storyNums.forEach(n => {
                        const a = textsByMs[ki]?.[n]?.fullText || '';
                        const b = textsByMs[kj]?.[n]?.fullText || '';
                        if (a || b) { s += 1 - fullTextSimilarity(a, b); c++; }
                    });
                    storyDist = c ? s / c : 1;
                } else {
                    storyDist = 1 - fullTextSimilarity(
                        textsByMs[ki]?.[selectedStory]?.fullText || '',
                        textsByMs[kj]?.[selectedStory]?.fullText || ''
                    );
                }
                dStory[pairKey] = storyDist;
                dGlobal[pairKey] = 1 - fullTextSimilarity(globalCorpus[ki], globalCorpus[kj]);
            }
        }
        return { dStory, dGlobal };
    }, [selectedMs, selectedStory, storyNums, textsByMs]);

    const mapPairwise = useMemo(() => {
        const getDist = (ki, kj) => {
            const pair = ki < kj ? `${ki}||${kj}` : `${kj}||${ki}`;
            if (treeBasis === 'global') return pairDist.dGlobal[pair] ?? 1;
            if (treeBasis === 'delta') return Math.abs((pairDist.dStory[pair] ?? 1) - (pairDist.dGlobal[pair] ?? 1));
            return pairDist.dStory[pair] ?? 1;
        };
        return selectedMs.map((a, i) => selectedMs.map((b, j) => {
            if (i === j) return { similarity: 1, distance: 0 };
            const d = getDist(a.key, b.key);
            return { similarity: Math.max(0, 1 - d), distance: d };
        }));
    }, [selectedMs, pairDist, treeBasis]);

    const tree = useMemo(() => {
        if (selectedMs.length < 2) return null;
        const labels = selectedMs.map(ms => `${shortLib(ms.library)} (${ms.number})`);
        const getDist = (i, j) => {
            const ki = selectedMs[i].key;
            const kj = selectedMs[j].key;
            const pair = ki < kj ? `${ki}||${kj}` : `${kj}||${ki}`;
            if (treeBasis === 'global') return pairDist.dGlobal[pair] ?? 1;
            if (treeBasis === 'delta') return Math.abs((pairDist.dStory[pair] ?? 1) - (pairDist.dGlobal[pair] ?? 1));
            return pairDist.dStory[pair] ?? 1;
        };
        return buildTreeFromDistance(labels, getDist);
    }, [selectedMs, treeBasis, pairDist]);

    const dendrogram = useMemo(() => {
        if (!tree) return null;
        const leaves = [];
        const collectLeaves = node => {
            if (!node) return;
            if (node.label) {
                leaves.push(node.label);
                return;
            }
            collectLeaves(node.left);
            collectLeaves(node.right);
        };
        collectLeaves(tree);
        const leafCount = Math.max(2, leaves.length);
        const width = Math.max(820, leafCount * 170);
        const yTop = 30;
        const yLeaf = 268;
        const labelY = yLeaf + 18;
        const height = labelY + 54;
        const maxHeight = Math.max(0.001, tree.height || 1);
        const yFor = h => yTop + ((maxHeight - (h || 0)) / maxHeight) * (yLeaf - yTop);
        const xByLeaf = {};
        leaves.forEach((label, idx) => {
            xByLeaf[label] = 62 + (idx * (width - 124)) / Math.max(1, leaves.length - 1);
        });
        const branchPalette = ['#334155', '#0f766e', '#0369a1', '#6d28d9', '#be123c'];
        const segments = [];
        const nodes = [];
        const labels = [];
        const ticks = Array.from({ length: 6 }, (_, i) => {
            const h = maxHeight - (maxHeight * i) / 5;
            return { y: yFor(h), h };
        });
        const splitLabel = raw => {
            const s = String(raw || '');
            const idx = s.indexOf('(');
            if (idx < 0) return { l1: s.slice(0, 24), l2: '' };
            return { l1: s.slice(0, idx).trim().slice(0, 24), l2: s.slice(idx).trim().slice(0, 20) };
        };
        const layout = (node, depth = 0) => {
            if (node.label) {
                const x = xByLeaf[node.label];
                const y = yFor(0);
                labels.push({ x, y: labelY, ...splitLabel(node.label) });
                return { x, y };
            }
            const left = layout(node.left, depth + 1);
            const right = layout(node.right, depth + 1);
            const y = yFor(node.height || 0);
            const x = (left.x + right.x) / 2;
            const col = branchPalette[depth % branchPalette.length];
            const w = Math.max(1.2, 2.4 - depth * 0.2);
            segments.push({ x1: left.x, y1: left.y, x2: left.x, y2: y, col, w });
            segments.push({ x1: right.x, y1: right.y, x2: right.x, y2: y, col, w });
            segments.push({ x1: Math.min(left.x, right.x), y1: y, x2: Math.max(left.x, right.x), y2: y, col, w });
            nodes.push({ x, y, h: node.height || 0, col });
            return { x, y };
        };
        layout(tree);
        return { width, height, ticks, segments, nodes, labels, yLeaf };
    }, [tree]);

    const toggleMs = key => {
        setSelectedKeys(prev => prev.includes(key)
            ? prev.filter(x => x !== key)
            : [...prev, key]);
    };

    if (!textsData.length) return (
        <div className="h-full flex flex-col items-center justify-center gap-2 text-slate-400 text-sm">
            <div>{T('noTexts', lang)}</div>
        </div>
    );

    return (
        <div className="flex h-full overflow-hidden">
            <div className="w-72 border-l border-slate-200 bg-slate-50 flex flex-col shrink-0 overflow-hidden">
                <div className="bg-slate-800 text-white text-xs font-semibold px-3 py-2.5 shrink-0">{lang === 'en' ? 'Texts and Synopsis' : 'טקסטים וסינופסיס'}</div>
                <div className="p-2 border-b border-slate-200 bg-white space-y-2 shrink-0">
                    {textsAudit && (
                        <div className="rounded-md border border-slate-200 bg-slate-50 px-2 py-1.5 text-[10px] text-slate-600 leading-relaxed">
                            <div className="font-semibold text-slate-700">{lang === 'en' ? 'Import audit' : 'בקרת ייבוא'}</div>
                            <div>{lang === 'en' ? `${textsAudit.keptRows}/${textsAudit.totalRows} visible rows` : `${textsAudit.keptRows}/${textsAudit.totalRows} שורות תצוגה`}</div>
                            {sheetAuditRows.length > 0 && <div>{sheetAuditRows.map(r => `#${r.sheetId}: ${r.keptRows}/${r.totalRows} | fn:${r.footnoteRows}`).join(' | ')}</div>}
                        </div>
                    )}
                    <div className="text-[10px] text-slate-500">{textsInnerTab === 'stories' ? (lang === 'en' ? 'Synopsis by story and section' : 'סינופסיס לפי סיפור וסעיף') : (lang === 'en' ? 'Distance map by manuscript' : 'מפת מרחקים בין כתבי יד')}</div>
                    <select value={selectedStory ?? ''} onChange={e => setSelectedStory(Number(e.target.value))} className="w-full border border-slate-300 rounded px-2 py-1 text-xs bg-white">
                        {storyNums.map(n => (
                            <option key={n} value={n}>{`${lang === 'en' ? 'Story' : 'סיפור'} ${n} — ${storyNames[n] || ''}`}</option>
                        ))}
                    </select>
                    {textsInnerTab === 'stories' && (
                        <>
                            <select value={baseSynopsisKey} onChange={e => setBaseSynopsisKey(e.target.value)} className="w-full border border-slate-300 rounded px-2 py-1 text-xs bg-white">
                                {synopsisRows.map(r => (
                                    <option key={r.key} value={r.key}>{`${shortLib(r.library)} (${r.number})`}</option>
                                ))}
                            </select>
                            <select value={selectedSegIdx == null ? '' : selectedSegIdx} onChange={e => setSelectedSegIdx(e.target.value === '' ? null : Number(e.target.value))} className="w-full border border-slate-300 rounded px-2 py-1 text-xs bg-white">
                                <option value="">{lang === 'en' ? 'Jump to section…' : 'קפוץ לסעיף…'}</option>
                                {synopsisTableRows.map(row => (
                                    <option key={`seg-${row.segIdx}`} value={row.segIdx}>{`${lang === 'en' ? 'Story' : 'סיפור'} ${row.storyNum} · ${lang === 'en' ? 'Section' : 'סעיף'} ${row.sectionNum}`}</option>
                                ))}
                            </select>
                            <div className="grid grid-cols-2 gap-2 text-[11px]">
                                <label className="flex items-center gap-2 rounded border border-slate-200 bg-slate-50 px-2 py-1"><input type="checkbox" checked={showSupplements} onChange={e => setShowSupplements(e.target.checked)} /><span>{lang === 'en' ? 'Show []' : 'הצג []'}</span></label>
                                <label className="flex items-center gap-2 rounded border border-slate-200 bg-slate-50 px-2 py-1"><input type="checkbox" checked={showCorrections} onChange={e => setShowCorrections(e.target.checked)} /><span>{lang === 'en' ? 'Show <>' : 'הצג <>'}</span></label>
                            </div>
                        </>
                    )}
                </div>
                <div className="px-3 py-2 text-[11px] text-slate-500 border-b border-slate-200 shrink-0">{lang === 'en' ? `Select manuscripts (${selectedKeys.length})` : `בחר כתבי יד (${selectedKeys.length})`}</div>
                <div className="overflow-y-auto flex-1 px-2 py-2 space-y-1">
                    {msList.map(ms => {
                        const checked = selectedKeys.includes(ms.key);
                        return (
                            <label key={ms.key} className={`flex items-start gap-2 rounded px-2 py-1.5 cursor-pointer ${checked ? 'bg-indigo-50' : 'hover:bg-white'}`}>
                                <input type="checkbox" checked={checked} onChange={() => toggleMs(ms.key)} className="mt-0.5" />
                                <span className="text-xs leading-snug">
                                    <span className="block text-slate-700">{shortLib(ms.library)}</span>
                                    <span className="block text-[10px] text-slate-400">{ms.number}</span>
                                    {ms.edition && <span className="block text-[10px] text-indigo-500">{lang === 'en' ? `ed. ${ms.edition}` : `מהדורה: ${ms.edition}`}</span>}
                                </span>
                            </label>
                        );
                    })}
                </div>
            </div>
            <div className="flex-1 overflow-auto p-4 bg-white space-y-4">
                <div className="flex justify-center">
                    <div className="inline-flex rounded-lg border border-slate-300 overflow-hidden bg-white text-xs">
                        <button onClick={() => setTextsInnerTab('stories')} className={`px-3 py-1.5 ${textsInnerTab === 'stories' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>{lang === 'en' ? 'Stories' : 'סיפורים'}</button>
                        <button onClick={() => setTextsInnerTab('map')} className={`px-3 py-1.5 ${textsInnerTab === 'map' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>{lang === 'en' ? 'General Map' : 'מפה כללית'}</button>
                    </div>
                </div>
                {textsInnerTab === 'stories' ? (
                    <div>
                        <div className="mb-4">
                            <h2 className="text-lg font-bold text-slate-800 heb">{selectedStory == null ? '' : (storyNames[selectedStory] || `${lang === 'en' ? 'Story' : 'סיפור'} ${selectedStory}`)}</h2>
                            <p className="text-slate-400 text-sm">{lang === 'en' ? 'The synopsis is shown by the sheet units themselves: A = story number, B = section number.' : 'הסינופסיס מוצג לפי יחידות הגיליון עצמו: A = מספר סיפור, B = מספר סעיף.'}</p>
                            <div className="mt-2 flex flex-wrap gap-2 text-[10px] text-slate-600">
                                <span className="inline-flex items-center gap-1 rounded bg-slate-100 px-1.5 py-0.5"><span className="inline-block rounded bg-sky-100 px-1 text-sky-900">[]</span>{lang === 'en' ? 'editorial supplement' : 'השלמת מהדירים'}</span>
                                <span className="inline-flex items-center gap-1 rounded bg-slate-100 px-1.5 py-0.5"><span className="inline-block rounded bg-violet-100 px-1 text-violet-900">&lt;&gt;</span>{lang === 'en' ? 'marginal correction' : 'הגהה בצד הטקסט'}</span>
                                <span className="inline-flex items-center gap-1 rounded bg-slate-100 px-1.5 py-0.5"><span className="inline-block rounded bg-slate-200 px-1 text-slate-700">1</span>{lang === 'en' ? 'footnote hover' : 'הערת שוליים במעבר עכבר'}</span>
                                <span className="inline-flex items-center gap-1 rounded bg-slate-100 px-1.5 py-0.5"><span className="inline-block w-2 h-2 rounded bg-amber-300" />{lang === 'en' ? 'geresh/gershayim and divine-name markers shown, not counted' : 'גרש/גרשיים וסימוני שם ה׳ מוצגים אך לא נספרים'}</span>
                            </div>
                        </div>
                        {synopsisRows.length === 0 ? (
                            <div className="text-sm text-slate-400">{lang === 'en' ? 'No texts are available for the selected story in the selected manuscripts.' : 'אין טקסטים זמינים לסיפור שנבחר בכתבי היד המסומנים.'}</div>
                        ) : (
                            <div className="space-y-3">
                                <div className="rounded-xl border border-slate-200 overflow-auto max-h-[60vh]">
                                    <table className="text-xs border-collapse min-w-[920px] w-full">
                                        <thead className="sticky top-0 z-10 bg-slate-800 text-white">
                                            <tr>
                                                <th className="px-2 py-2 text-center border-l border-slate-600 min-w-[48px]">A</th>
                                                <th className="px-2 py-2 text-center border-l border-slate-600 min-w-[48px]">B</th>
                                                {synopsisRows.map(r => {
                                                    const profile = textDiffProfile(synopsisByKey[baseSynopsisKey] || '', synopsisByKey[r.key] || '');
                                                    return (
                                                        <th key={r.key} onClick={() => setMsReadKey(r.key)} className={`px-2 py-2 text-right border-l border-slate-600 min-w-[230px] align-bottom cursor-pointer hover:bg-slate-700/40 ${msReadKey === r.key ? 'bg-slate-700/60' : ''}`}>
                                                            <div className="text-[11px] leading-tight">{shortLib(r.library)}</div>
                                                            <div className="text-[10px] text-slate-300 mt-0.5">{r.number}</div>
                                                            {r.edition && <div className="text-[10px] text-amber-300 mt-0.5">{lang === 'en' ? `ed. ${r.edition}` : `מהדורה: ${r.edition}`}</div>}
                                                            <div className={`inline-block mt-1 text-[9px] rounded px-1.5 py-0.5 ${r.key === baseSynopsisKey ? 'bg-indigo-500 text-white' : profile.score > 0.82 ? 'bg-emerald-500 text-white' : profile.score > 0.62 ? 'bg-amber-500 text-white' : 'bg-rose-500 text-white'}`}>{r.key === baseSynopsisKey ? (lang === 'en' ? 'Base' : 'בסיס') : `${lang === 'en' ? 'Similarity' : 'דמיון'} ${Math.round(profile.score * 100)}%`}</div>
                                                        </th>
                                                    );
                                                })}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {synopsisTableRows.map(row => {
                                                const baseCell = row.cells.find(c => c.key === baseSynopsisKey)?.text || '';
                                                const baseNotes = synopsisNotesByKey[baseSynopsisKey] || {};
                                                return (
                                                    <tr key={row.segIdx} data-seg-idx={row.segIdx} className={`border-b border-slate-100 align-top hover:bg-slate-50 ${row.segIdx === selectedSegIdx ? 'bg-indigo-50/60' : ''}`}>
                                                        <td className="px-2 py-2 text-center text-slate-400 font-mono border-l border-slate-100">{row.storyNum}</td>
                                                        <td className="px-2 py-2 text-center text-slate-400 font-mono border-l border-slate-100">{row.sectionNum}</td>
                                                        {row.cells.map(cell => {
                                                            const profile = cell.key === baseSynopsisKey ? { score: 1, added: 0, removed: 0 } : textDiffProfile(baseCell, cell.text);
                                                            const wordDiff = cell.key === baseSynopsisKey ? null : wordLevelWitnessDiff(baseCell, cell.text);
                                                            const cls = profile.score > 0.9 ? 'bg-white text-slate-700' : profile.score > 0.7 ? 'bg-amber-50 text-amber-900' : 'bg-rose-50 text-rose-900';
                                                            return (
                                                                <td key={cell.key} className={`px-2 py-2 border-l border-slate-100 leading-relaxed heb text-justify ${cls}`}>
                                                                    {cell.key === baseSynopsisKey ? (
                                                                        cell.text ? renderDisplayText(cell.text, cell.notes, { showSupplements, showCorrections, keyPrefix: `${cell.key}-${row.segIdx}-base` }) : <span className="text-slate-300">ֲ·</span>
                                                                    ) : cell.text ? (
                                                                        <span>
                                                                            {wordDiff.tokens.map((tok, idx) => (
                                                                                <React.Fragment key={`${cell.key}-${row.segIdx}-${idx}`}>
                                                                                    <span className={tok.kind === 'added' ? 'bg-rose-200 text-rose-900 rounded px-0.5' : tok.kind === 'minor' ? 'bg-amber-200 text-amber-900 rounded px-0.5' : ''}>{renderDisplayText(tok.raw, cell.notes, { showSupplements, showCorrections, keyPrefix: `${cell.key}-${row.segIdx}-${idx}` })}</span>
                                                                                    {idx < wordDiff.tokens.length - 1 ? ' ' : ''}
                                                                                </React.Fragment>
                                                                            ))}
                                                                        </span>
                                                                    ) : <span className="text-slate-300">ֲ·</span>}
                                                                    {cell.key !== baseSynopsisKey && cell.text && <div className="mt-1 text-[9px] text-slate-500 not-italic" dir="ltr">seg +{profile.added} -{profile.removed} · words +{wordDiff.addedCount} -{wordDiff.removedCount}</div>}
                                                                    {cell.key !== baseSynopsisKey && wordDiff && wordDiff.removedWords.length > 0 && (
                                                                        <div className="mt-1 text-[9px] text-slate-500 leading-snug not-italic" dir="ltr">base-only:{' '}{wordDiff.removedWords.slice(0, 8).map((w, idx) => <span key={`${cell.key}-${row.segIdx}-rm-${idx}`} className="line-through text-rose-700 mr-1">{renderDisplayText(w, baseNotes, { showSupplements, showCorrections, keyPrefix: `${cell.key}-${row.segIdx}-rm-${idx}` })}</span>)}{wordDiff.removedWords.length > 8 ? ' ...' : ''}</div>
                                                                    )}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                                {/* Footnote legend — shows all footnotes referenced in the current story */}
                                {synopsisRows.some(r => Object.keys(r.notes || {}).length > 0) && (
                                    <div className="rounded-xl border border-amber-200 bg-amber-50 p-3">
                                        <div className="text-xs font-semibold text-amber-800 mb-2">{lang === 'en' ? 'Footnotes' : 'הערות שוליים'}</div>
                                        <div className="space-y-1">
                                            {synopsisRows.filter(r => Object.keys(r.notes || {}).length > 0).map(r => (
                                                <div key={r.key} className="text-[11px]">
                                                    <span className="font-medium text-amber-700">{shortLib(r.library)} {r.number}:</span>
                                                    {Object.entries(r.notes).sort(([a],[b]) => Number(a)-Number(b)).map(([ref, text]) => (
                                                        <span key={ref} className="mr-3 text-slate-700 heb"> [{ref}] {text}</span>
                                                    ))}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {msReadRow && (
                                    <div className="rounded-xl border border-slate-200 bg-slate-50 p-3">
                                        <div className="flex items-center justify-between gap-2 mb-2">
                                            <div>
                                                <div className="text-sm font-semibold text-slate-700">{lang === 'en' ? 'Manuscript reading' : 'קריאה לפי כתב יד'}</div>
                                                <div className="text-[11px] text-slate-500">{shortLib(msReadRow.library)} | {msReadRow.number}</div>
                                            </div>
                                            <button onClick={() => setMsReadKey('')} className="text-[11px] text-slate-500 hover:text-slate-700">{lang === 'en' ? 'Close' : 'סגור'}</button>
                                        </div>
                                        <div className="rounded-lg border border-slate-200 bg-white max-h-[380px] overflow-y-auto">
                                            {msReadRow.seq.map(row => (
                                                <div key={`msread-${msReadRow.key}-${row.num}`} className={`p-3 border-b border-slate-100 last:border-b-0 ${row.num === selectedStory ? 'bg-indigo-50/60' : ''}`}>
                                                    <div className="text-[11px] text-indigo-600 font-semibold mb-1">{lang === 'en' ? `Story ${row.num}` : `סיפור ${row.num}`} {storyNames[row.num] ? `— ${storyNames[row.num]}` : ''}</div>
                                                    <p className="text-sm leading-relaxed text-slate-800 heb text-justify">{renderDisplayText(row.text, row.notes, { showSupplements, showCorrections, keyPrefix: `${msReadRow.key}-${row.num}` })}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div className="rounded-xl border border-slate-200 bg-slate-50 p-3">
                                    <div className="flex items-center justify-between gap-2 mb-2">
                                        <div className="text-sm font-semibold text-slate-700">{lang === 'en' ? 'Story manuscript tree' : 'עץ כתבי יד לסיפור'}</div>
                                        <div className="flex items-center gap-2 text-xs">
                                            <label className="text-[11px] text-slate-500">{lang === 'en' ? 'Zoom' : 'זום'}</label>
                                            <input type="range" min="0.7" max="1.8" step="0.1" value={treeZoom} onChange={e => setTreeZoom(Number(e.target.value))} />
                                        </div>
                                    </div>
                                    {selectedMs.length < 2 ? (
                                        <div className="text-xs text-slate-400">{lang === 'en' ? 'Select at least two manuscripts to show a tree.' : 'בחר לפחות שני כתבי יד כדי להציג עץ.'}</div>
                                    ) : !dendrogram ? (
                                        <div className="text-xs text-slate-400">{lang === 'en' ? 'Tree could not be computed for current selection.' : 'לא ניתן לחשב עץ עבור הבחירה הנוכחית.'}</div>
                                    ) : (
                                        <div className="bg-white rounded-lg border border-slate-200 p-3 overflow-auto">
                                            <svg viewBox={`0 0 ${dendrogram.width} ${dendrogram.height}`} width="100%" height={Math.min(520, dendrogram.height)} className="min-w-[760px]" style={{ transform: `scale(${treeZoom})`, transformOrigin: 'top center' }}>
                                                {dendrogram.ticks.map((t, i) => <g key={`tick-s-${i}`}><line x1={26} y1={t.y} x2={dendrogram.width - 26} y2={t.y} stroke="#e2e8f0" strokeWidth="1" /><text x={28} y={t.y - 3} fontSize="9" fill="#94a3b8">d={t.h.toFixed(2)}</text></g>)}
                                                {dendrogram.segments.map((s, i) => <line key={`br-s-${i}`} x1={s.x1} y1={s.y1} x2={s.x2} y2={s.y2} stroke={s.col} strokeWidth={s.w} strokeLinecap="round" opacity="0.9" />)}
                                                {dendrogram.nodes.map((n, i) => <g key={`nd-s-${i}`}><circle cx={n.x} cy={n.y} r="3.1" fill={n.col} stroke="#0f172a" strokeWidth="0.5" /><rect x={n.x - 13} y={n.y - 14} width="26" height="10" rx="3" fill="white" opacity="0.94" /><text x={n.x - 11} y={n.y - 6} fontSize="8.5" fill="#64748b">{n.h.toFixed(2)}</text></g>)}
                                                {dendrogram.labels.map((lb, i) => <line key={`st-s-${i}`} x1={lb.x} y1={dendrogram.yLeaf} x2={lb.x} y2={lb.y - 4} stroke="#cbd5e1" strokeWidth="1" />)}
                                                {dendrogram.labels.map((lb, i) => <g key={`lb-s-${i}`}><rect x={lb.x - 72} y={lb.y} width="144" height="34" rx="6" fill="#f8fafc" stroke="#e2e8f0" /><text x={lb.x} y={lb.y + 12} fontSize="10" fill="#0f172a" textAnchor="middle">{lb.l1}</text>{lb.l2 && <text x={lb.x} y={lb.y + 24} fontSize="9" fill="#64748b" textAnchor="middle">{lb.l2}</text>}</g>)}
                                            </svg>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                ) : (
                    <div className="space-y-4">
                        <div className="rounded-xl border border-slate-200 bg-slate-50 p-3">
                            <div className="flex items-center justify-between gap-3 flex-wrap">
                                <div>
                                    <div className="text-sm font-semibold text-slate-700">{lang === 'en' ? 'Manuscript distance basis' : 'בסיס חישוב המרחק בין כתבי היד'}</div>
                                    <div className="text-[11px] text-slate-500 mt-0.5">{treeBasis === 'story' ? (lang === 'en' ? 'Current story only' : 'הסיפור הנבחר בלבד') : treeBasis === 'global' ? (lang === 'en' ? 'All loaded texts by manuscript' : 'כל הטקסטים הטעונים לכל כתב יד') : (lang === 'en' ? 'Gap between story-local and global similarity' : 'פער בין דמיון מקומי של הסיפור לדמיון כללי')}</div>
                                </div>
                                <div className="flex gap-2 text-xs">
                                    <button onClick={() => setTreeBasis('story')} className={`px-3 py-1.5 rounded-lg ${treeBasis === 'story' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-300 text-slate-600'}`}>{lang === 'en' ? 'Current Story' : 'הסיפור הנבחר'}</button>
                                    <button onClick={() => setTreeBasis('global')} className={`px-3 py-1.5 rounded-lg ${treeBasis === 'global' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-300 text-slate-600'}`}>{lang === 'en' ? 'Global Corpus' : 'הקורפוס המלא'}</button>
                                    <button onClick={() => setTreeBasis('delta')} className={`px-3 py-1.5 rounded-lg ${treeBasis === 'delta' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-300 text-slate-600'}`}>{lang === 'en' ? 'Delta' : 'פער'}</button>
                                </div>
                            </div>
                        </div>
                        <div className="rounded-xl border border-slate-200 bg-white overflow-auto">
                            <table className="text-xs border-collapse min-w-[760px] w-full">
                                <thead className="sticky top-0 z-10 bg-slate-800 text-white">
                                    <tr>
                                        <th className="px-2 py-2 text-right border-l border-slate-600">{lang === 'en' ? 'Manuscript' : 'כתב יד'}</th>
                                        {selectedMs.map(r => <th key={`mh-${r.key}`} className="px-2 py-2 text-right border-l border-slate-600 min-w-[120px]"><div className="text-[10px] leading-tight">{shortLib(r.library)}</div><div className="text-[9px] text-slate-300">{r.number}</div></th>)}
                                    </tr>
                                </thead>
                                <tbody>
                                    {selectedMs.map((rowMs, i) => (
                                        <tr key={`mr-${rowMs.key}`} className="border-b border-slate-100">
                                            <td className="px-2 py-2 text-right bg-slate-50 border-l border-slate-100"><div className="text-[10px] leading-tight text-slate-700">{shortLib(rowMs.library)}</div><div className="text-[9px] text-slate-400">{rowMs.number}</div></td>
                                            {selectedMs.map((colMs, j) => {
                                                const p = mapPairwise[i][j];
                                                const tone = p.similarity > 0.82 ? 'bg-emerald-50 text-emerald-800' : p.similarity > 0.62 ? 'bg-amber-50 text-amber-800' : 'bg-rose-50 text-rose-800';
                                                return <td key={`mc-${rowMs.key}-${colMs.key}`} className={`px-2 py-2 border-l border-slate-100 ${tone}`}><div className="font-semibold">{Math.round(p.similarity * 100)}%</div><div className="text-[9px] opacity-80">d={p.distance.toFixed(2)}</div></td>;
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
}

const App = () => {
    const [lang,      setLang    ] = useState('he');
    const [tab,       setTab     ] = useState('inventory');
    const [view,      setView    ] = useState('table');   // 'table' | 'map'
    const [textsJumpStory, setTextsJumpStory] = useState(null);
    const [loading,   setLoading ] = useState(true);
    const [reloadSeq, setReloadSeq] = useState(0);
    const [lastLoadedAt, setLastLoadedAt] = useState(null);
    const [errors,    setErrors  ] = useState([]);
    const [mssData,   setMssData ] = useState([]);
    const [workNames, setWorkNames] = useState([]);
    const [metaFields, setMetaFields] = useState([]);
    const [orderData, setOrderData] = useState([]);
    const [allStories, setAllStories] = useState([]);
    const [textsData, setTextsData] = useState([]);
    const [textsAudit, setTextsAudit] = useState(null);
    const storiesWithFullText = useMemo(() => {
        const s = new Set();
        textsData.forEach(t => {
            if (t.storyNum == null) return;
            if (!String(t.text || '').trim()) return;
            s.add(Number(t.storyNum));
        });
        return [...s];
    }, [textsData]);

    const requestLiveReload = () => {
        setReloadSeq(x => x + 1);
    };

    useEffect(() => {
        const enc = s => encodeURIComponent(s);
        const cacheTag = `reload_${reloadSeq}_${Date.now()}`;
        setLoading(true);
        setErrors([]);

        Promise.allSettled([
            fetchGviz(IGERET_ID, 'sheet=' + enc('Sarfati-Mss'),        cacheTag + '_mss'),
            fetchGviz(IGERET_ID, 'sheet=' + enc('רשימת סיפורים-1'),    cacheTag + '_order'),
            ...SYNOPSIS_SHEETS.map(sheetId =>
                fetchGviz(IGERET_ID, 'sheet=' + enc(sheetId), `${cacheTag}_synopsis_${sheetId}`),
            ),
        ]).then(results => {
            const [r0, r1, ...synopsisResults] = results;
            const errs = [];
            let parsedMss = { mssData: [], workNames: [], metaFields: [], nameToMss: {} };
            let parsedOrder = [];

            if (r0.status === 'fulfilled') {
                parsedMss = parseMss(r0.value);
                setMssData(parsedMss.mssData);
                setWorkNames(parsedMss.workNames);
                setMetaFields(parsedMss.metaFields || []);
            } else {
                errs.push(`מצאי כ״י: ${r0.reason?.message || 'שגיאה'}`);
            }

            if (r1.status === 'fulfilled') {
                const parsed = parseStoryListV2(r1.value, parsedMss.nameToMss || {});
                parsedOrder = parsed.orderData;
                setOrderData(parsed.orderData);
                setAllStories(parsed.allStories || []);
            } else {
                errs.push(`סדר סיפורים: ${r1.reason?.message || 'שגיאה'}`);
            }

            const goodSheets = [];
            synopsisResults.forEach((res, idx) => {
                const sheetId = SYNOPSIS_SHEETS[idx];
                if (res.status === 'fulfilled') {
                    goodSheets.push({ sheetId, resp: res.value });
                } else {
                    // Sheet may not exist yet — silently skip
                    console.debug(`synopsis sheet ${sheetId} not found:`, res.reason?.message);
                }
            });

            if (goodSheets.length) {
                const parsedTexts = parseSynopsisCollection(goodSheets, buildKnownManuscripts(parsedMss.mssData, parsedOrder));
                setTextsData(parsedTexts.rows || []);
                setTextsAudit(parsedTexts.audit || null);
            } else {
                setTextsData([]);
                setTextsAudit(null);
            }

            setErrors(errs);
            setLastLoadedAt(new Date());
            setLoading(false);
        });
    }, [reloadSeq]);

    /* Loading screen */
    if (loading) return (
        <div className="h-screen flex flex-col items-center justify-center gap-5 bg-slate-50">
            <div className="spin-ring" />
            <div className="text-center">
                <p className="text-slate-600 font-medium text-sm">{T('loadingTitle', lang)}</p>
                <p className="text-slate-400 text-xs mt-1">{T('loadingSub', lang)}</p>
            </div>
        </div>
    );

    /* Derived stats */
    const uniqueIgeretMs = new Set(orderData.map(r => msKey(r.library, r.number))).size;
    const uniqueStories  = new Set(textsData.map(t => t.storyNum).filter(Boolean)).size;

    const TABS = [
        { id: 'inventory', label: T('tabInventory', lang), desc: `${mssData.length} ${T('mssLabel', lang)}` },
        { id: 'order',     label: T('tabOrder',     lang), desc: `${uniqueIgeretMs} ${T('mssLabel', lang)}` },
        { id: 'texts',     label: T('tabTexts',     lang), desc: `${uniqueStories}` },
    ];

    return (
        <div className="flex flex-col h-screen overflow-hidden bg-slate-100" dir={lang === 'en' ? 'ltr' : 'rtl'}>

            {/* ── HEADER ── */}
            <header className="bg-slate-900 text-white px-4 py-3 flex items-center justify-between gap-3 flex-wrap shrink-0 shadow-md z-40">
                <div>
                    <h1 className="text-[15px] font-bold leading-tight">{T('appTitle', lang)}</h1>
                    <p className="text-[11px] text-slate-400 mt-0.5">{T('appSub', lang)}</p>
                </div>
                <nav className="flex gap-1 bg-slate-800 p-1 rounded-xl">
                    {TABS.map(t => (
                        <button key={t.id} onClick={() => setTab(t.id)}
                            className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex flex-col items-center gap-0
                                ${tab === t.id
                                    ? 'bg-indigo-600 text-white shadow-sm'
                                    : 'text-slate-300 hover:text-white hover:bg-slate-700'}`}>
                            <span>{t.label}</span>
                            <span className={`text-[9px] ${tab === t.id ? 'text-indigo-200' : 'text-slate-500'}`}>
                                {t.desc}
                            </span>
                        </button>
                    ))}
                </nav>
                <button
                    onClick={() => setLang(l => l === 'he' ? 'en' : 'he')}
                    className="text-xs bg-slate-700 hover:bg-slate-600 text-slate-200 px-3 py-1.5 rounded-lg transition-colors border border-slate-600 shrink-0">
                    {T('langBtn', lang)}
                </button>
                <button
                    onClick={() => requestLiveReload()}
                    className="text-xs bg-emerald-700 hover:bg-emerald-600 text-emerald-50 px-3 py-1.5 rounded-lg transition-colors border border-emerald-600 shrink-0">
                    {lang === 'en' ? 'Reload Data' : 'רענון נתונים'}
                </button>
            </header>

            <div className="bg-slate-50 border-b border-slate-200 px-4 py-1.5 text-[11px] text-slate-500 shrink-0">
                {lang === 'en' ? 'Last live load:' : 'טעינה חיה אחרונה:'} {lastLoadedAt ? lastLoadedAt.toLocaleTimeString() : '—'}
            </div>

            {/* ── ERROR BANNER ── */}
            {errors.length > 0 && (
                <div className="bg-amber-50 border-b border-amber-200 px-4 py-2 text-sm text-amber-800 flex gap-2 items-start shrink-0">
                    <span className="shrink-0">⚠</span>
                    <div>
                        <span className="font-semibold">{T('errTitle', lang)} </span>
                        {errors.join(' | ')}
                        <div className="text-xs text-amber-600 mt-0.5">
                            {T('errHint', lang)}
                        </div>
                    </div>
                </div>
            )}

            {/* ── MAIN ── */}
            <main className="flex-1 overflow-hidden p-3" style={{ minHeight: 0 }}>
                <div className="h-full bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">

                    {/* ── INVENTORY TAB ── */}
                    {tab === 'inventory' && (
                        <>
                            <div className="border-b border-slate-200 px-3 py-2 bg-slate-50 flex items-center gap-2 shrink-0">
                                <button onClick={() => setView('table')}
                                    className={`px-3 py-1 rounded-lg text-xs font-medium transition-colors
                                        ${view === 'table'
                                            ? 'bg-indigo-600 text-white shadow-sm'
                                            : 'border border-slate-300 bg-white text-slate-600 hover:bg-slate-50'}`}>
                                    {T('viewTable', lang)}
                                </button>
                                <button onClick={() => setView('map')}
                                    className={`px-3 py-1 rounded-lg text-xs font-medium transition-colors
                                        ${view === 'map'
                                            ? 'bg-indigo-600 text-white shadow-sm'
                                            : 'border border-slate-300 bg-white text-slate-600 hover:bg-slate-50'}`}>
                                    {T('viewMap', lang)}
                                </button>
                            </div>
                            <div className="flex-1 overflow-hidden">
                                {view === 'table'
                                    ? <InventoryTable mssData={mssData} workNames={workNames} metaFields={metaFields} lang={lang} />
                                    : <ProximityMap   mssData={mssData} workNames={workNames} orderData={orderData} lang={lang} />
                                }
                            </div>
                        </>
                    )}

                    {/* ── STORY ORDER TAB ── */}
                    {tab === 'order' && (
                        <StoryOrderTab
                            orderData={orderData}
                            allStories={allStories}
                            lang={lang}
                            storiesWithFullText={storiesWithFullText}
                            onOpenTextStory={(storyNum) => {
                                setTextsJumpStory(storyNum);
                                setTab('texts');
                            }}
                        />
                    )}

                    {/* ── TEXTS TAB ── */}
                    {tab === 'texts' && (
                        <TextsTabV2 textsData={textsData} textsAudit={textsAudit} orderData={orderData} lang={lang} jumpStory={textsJumpStory} />
                    )}

                </div>
            </main>

            {/* ── FOOTER ── */}
            <footer className="bg-white border-t border-slate-200 py-1.5 text-center text-[10px] text-slate-400 shrink-0">
                {T('footer', lang)}
            </footer>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
