            parts.push(Math.max(0, 1 - (Math.abs(ya - yb) / 250)));
        }

        if (!parts.length) return null;
        return parts.reduce((s, x) => s + x, 0) / parts.length;
    };

    const pairData = useMemo(() => {
        if (!mssData.length) {
            return {
                pairs: [],
                positions: [],
                visiblePairs: [],
                significantPairs: [],
                communities: [],
                stats: { modularity: 0, density: 0, edgeCount: 0, communityCount: 0, totalPairs: 0 },
            };
        }

        const pairs = [];
        for (let i = 0; i < mssData.length; i++) {
            for (let j = i + 1; j < mssData.length; j++) {
                const inv = jaccard(mssData[i].works, mssData[j].works);

                const bio = useBiblio ? bibliographicSimilarity(mssData[i], mssData[j]) : null;

                let ord = null;
                if (useOrder) {
                    const ki = normalizedMsKey(mssData[i].library, mssData[i].number);
                    const kj = normalizedMsKey(mssData[j].library, mssData[j].number);
                    const rel = orderSimilarity(orderVectors[ki] || {}, orderVectors[kj] || {});
                    ord = rel.overlap >= 3 ? rel.similarity : null;
                }

                let num = inv;
                let den = 1;
                if (useBiblio && bio != null) {
                    num += biblioWeight * bio;
                    den += biblioWeight;
                }
                if (useOrder && ord != null) {
                    num += orderWeight * ord;
                    den += orderWeight;
                }
                const sim = den ? (num / den) : inv;
                if (sim <= 0) continue;

                pairs.push({ i, j, sim, inv, bio, ord });
            }
        }

        const n = mssData.length;
        const commRes = detectCommunities(n, pairs, { k: 3, minSim: Math.max(0.08, linkThreshold || 0.08) });
        const layoutPairs = commRes.significantPairs.length ? commRes.significantPairs : pairs;
        const visiblePairs = linkThreshold <= 0 ? [] : pairs.filter(p => p.sim >= linkThreshold);
        const positions = forceLayout(n, layoutPairs, W, H);

        return {
            pairs,
            positions,
            visiblePairs,
            significantPairs: layoutPairs,
            communities: commRes.communities,
            stats: {
                modularity: commRes.modularity,
                density: n > 1 ? visiblePairs.length / (n * (n - 1) / 2) : 0,
                edgeCount: visiblePairs.length,
                communityCount: commRes.communityCount,
                totalPairs: pairs.length,
            },
        };
    }, [mssData, orderVectors, useBiblio, biblioWeight, useOrder, orderWeight, linkThreshold]);

    const { pairs, positions, visiblePairs, significantPairs, communities, stats } = pairData;

    const nodeColor = i => communities[i] === -1
        ? ISOLATED_COLOR
        : COMM_PALETTE[communities[i] % COMM_PALETTE.length];

    const connectorPairs = useMemo(() => {
        if (renderMode !== 'works') return [];
        return linkThreshold <= 0 ? significantPairs : visiblePairs;
    }, [renderMode, linkThreshold, significantPairs, visiblePairs]);

    const connectionVertices = useMemo(() => {
        return connectorPairs.flatMap((p, idx) => {
            const a = positions[p.i];
            const b = positions[p.j];
            if (!a || !b) return [];
            const setB = new Set(mssData[p.j].works || []);
            const sharedWorks = (mssData[p.i].works || []).filter(w => setB.has(w));
            const labels = sharedWorks.slice(0, 2);
            if (sharedWorks.length > 2) labels.push(`+${sharedWorks.length - 2}`);
            if (!labels.length) labels.push(lang === 'en' ? 'shared corpus' : 'חפיפה כללית');
            const mx = (a.x + b.x) / 2;
            const my = (a.y + b.y) / 2;
            const ox = ((idx % 5) - 2) * 1.8;
            const oy = (Math.floor(idx / 5) % 5 - 2) * 1.8;
            return labels.map((label, k) => ({
                ...p,
                x: mx + ox + (k - (labels.length - 1) / 2) * 7,
                y: my + oy - (k % 2 ? 5 : -5),
                label,
            }));
        });
    }, [connectorPairs, positions, mssData, lang]);

    const labelFontSize = scale => {
        const base = 8.4;
        const dyn = base / Math.pow(Math.max(0.6, scale), 1.18);
        return Math.max(6, Math.min(9.5, dyn));
    };

    const commInfo = useMemo(() => {
        const m = {};
        communities.forEach((c, i) => {
            const key = c === -1 ? '__iso' : String(c);
            if (!m[key]) {
                m[key] = {
                    id: c,
                    isolated: c === -1,
                    color: c === -1 ? ISOLATED_COLOR : COMM_PALETTE[c % COMM_PALETTE.length],
                    members: [],
                };
            }
            m[key].members.push(mssData[i]);
        });
        return m;
    }, [communities, mssData]);

    const hoveredMs = hoveredIdx == null ? null : mssData[hoveredIdx];
    const selectedMs = selectedIdx == null ? null : mssData[selectedIdx];

    const selectedNeighbours = useMemo(() => {
        if (selectedIdx == null) return [];
        return pairs
            .filter(p => p.i === selectedIdx || p.j === selectedIdx)
            .map(p => {
                const other = p.i === selectedIdx ? p.j : p.i;
                const ms = mssData[other];
                return {
                    idx: other,
                    ms,
                    sim: p.sim,
                    inv: p.inv,
                    bio: p.bio,
                    ord: p.ord,
                    identicalInventory: p.inv >= 0.999,
                };
            })
            .sort((a, b) => b.sim - a.sim || b.inv - a.inv);
    }, [selectedIdx, pairs, mssData]);

    if (!mssData.length) return (
        <div className="flex items-center justify-center h-full text-slate-400 text-sm">אין נתוני כתבי יד</div>
    );

    return (
        <div className="flex flex-col h-full overflow-hidden">
            <div className="px-3 py-2 border-b border-slate-200 bg-slate-50 flex flex-wrap gap-3 items-center shrink-0 text-xs text-slate-600">
                <div className="inline-flex rounded-lg border border-slate-300 overflow-hidden bg-white text-[11px]">
                    <button onClick={() => setRenderMode('links')}
                        className={`px-2.5 py-1 ${renderMode === 'links' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>
                        {lang === 'en' ? 'Connection lines' : 'קווי קשר'}
                    </button>
                    <button onClick={() => setRenderMode('works')}
                        className={`px-2.5 py-1 border-r border-slate-300 ${renderMode === 'works' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>
                        {lang === 'en' ? 'Include work names' : 'כולל שמות חיבורים'}
                    </button>
                </div>

                <label className="flex items-center gap-2 text-[11px] text-slate-500">
                    <span>{lang === 'en' ? 'Line threshold (0 hides lines)' : 'סף דמיון לקווים (0 מסתיר קווים)'}</span>
                    <input type="range" min="0" max="0.95" step="0.05"
                        value={linkThreshold}
                        onChange={e => setLinkThreshold(Number(e.target.value))}
                        className="w-32" />
                    <span className="font-mono px-1.5 py-0.5 rounded bg-white border border-slate-200">{Math.round(linkThreshold * 100)}%</span>
                </label>

                <div className="inline-flex items-center gap-1 rounded-lg border border-slate-300 bg-white px-1 py-1">
                    <button
                        onClick={() => setUseBiblio(v => !v)}
                        className={`text-[11px] px-2 py-0.5 rounded ${useBiblio ? 'bg-emerald-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>
                        {lang === 'en' ? 'Add bibliography details' : 'הוספת פרטים ביבליוגרפיים'}
                    </button>
                    {useBiblio && (
                        <label className="flex items-center gap-1 px-1 text-[10px] text-slate-500">
                            <span>{lang === 'en' ? 'weight' : 'משקל'}</span>
                            <input type="range" min="0.1" max="1" step="0.05" value={biblioWeight}
                                onChange={e => setBiblioWeight(Number(e.target.value))} className="w-20" />
                            <span>{biblioWeight.toFixed(2)}</span>
                        </label>
                    )}
                </div>

                <div className="inline-flex items-center gap-1 rounded-lg border border-slate-300 bg-white px-1 py-1">
                    <button
                        onClick={() => setUseOrder(v => !v)}
                        className={`text-[11px] px-2 py-0.5 rounded ${useOrder ? 'bg-amber-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>
                        {lang === 'en' ? 'Add story-order metric' : 'הוספת מדד סדר סיפורים'}
                    </button>
                    {useOrder && (
                        <label className="flex items-center gap-1 px-1 text-[10px] text-slate-500">
                            <span>{lang === 'en' ? 'weight' : 'משקל'}</span>
                            <input type="range" min="0.1" max="1" step="0.05" value={orderWeight}
                                onChange={e => setOrderWeight(Number(e.target.value))} className="w-20" />
                            <span>{orderWeight.toFixed(2)}</span>
                        </label>
                    )}
                </div>

                <button
                    onClick={() => setShowMethod(v => !v)}
                    className="text-[11px] px-2 py-1 rounded border border-slate-300 bg-white text-slate-600 hover:bg-slate-50">
                    {lang === 'en' ? 'What is this?' : 'מה זה ואיך עשינו את זה?'}
                </button>

                <span className="text-[10px] text-slate-500 bg-white border border-slate-200 rounded px-1.5 py-0.5">
                    {lang === 'en' ? 'clusters' : 'אשכולות'}: {stats.communityCount}
                </span>
                <span className="text-[10px] text-slate-500 bg-white border border-slate-200 rounded px-1.5 py-0.5">
                    {lang === 'en' ? 'visible links' : 'קשרים גלויים'}: {stats.edgeCount}
                </span>
                <span className="text-[10px] text-slate-500 bg-white border border-slate-200 rounded px-1.5 py-0.5">
                    {lang === 'en' ? 'candidate links' : 'קשרים אפשריים'}: {stats.totalPairs}
                </span>
                <div className="flex flex-wrap gap-2 items-center mr-auto">
                    {Object.values(commInfo)
                        .sort((a, b) => a.id - b.id)
                        .map(c => (
                            <span key={c.id} className="flex items-center gap-1 text-[10px] text-slate-600">
                                <span className="w-2.5 h-2.5 rounded-full inline-block shrink-0" style={{ background: c.color }} />
                                {c.members.length}
                            </span>
                        ))}
                </div>
            </div>

            <div
                className="flex-1 overflow-hidden relative"
                onMouseDown={e => {
                    panRef.current = {
                        x: e.clientX,
                        y: e.clientY,
                        tx: viewState.tx,
                        ty: viewState.ty,
                    };
                    setIsPanning(true);
                }}
                onMouseUp={() => setIsPanning(false)}
                onWheel={e => {
                    e.preventDefault();
                    const rect = e.currentTarget.getBoundingClientRect();
                    const px = e.clientX - rect.left;
                    const py = e.clientY - rect.top;
                    setViewState(prev => {
                        const factor = e.deltaY < 0 ? 1.12 : (1 / 1.12);
                        const nextScale = Math.max(0.65, Math.min(2.4, prev.scale * factor));
                        const wx = (px - prev.tx) / prev.scale;
                        const wy = (py - prev.ty) / prev.scale;
                        return {
                            scale: nextScale,
                            tx: px - wx * nextScale,
                            ty: py - wy * nextScale,
                        };
                    });
                }}
                onMouseMove={e => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    setTipPos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
                    if (isPanning && panRef.current) {
                        setViewState(prev => ({
                            ...prev,
                            tx: panRef.current.tx + (e.clientX - panRef.current.x),
                            ty: panRef.current.ty + (e.clientY - panRef.current.y),
                        }));
                    }
                }}
                onMouseLeave={() => { setHoveredIdx(null); setIsPanning(false); }}
                style={{ cursor: isPanning ? 'grabbing' : 'grab' }}>
                <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="100%" className="bg-[radial-gradient(circle_at_16%_16%,#f8fafc,#ffffff_38%,#eef2ff)]" style={{ display: 'block' }}>
                    <g transform={`translate(${viewState.tx} ${viewState.ty}) scale(${viewState.scale})`}>
                    {visiblePairs.map(({ i, j, sim }) => {
                        const p1 = positions[i];
                        const p2 = positions[j];
                        if (!p1 || !p2) return null;
                        return (
                            <line
                                key={`ln-${i}-${j}`}
                                x1={p1.x}
                                y1={p1.y}
                                x2={p2.x}
                                y2={p2.y}
                                stroke="rgba(100,116,139,0.22)"
                                strokeWidth={0.5 + sim * 1.1}
                                strokeLinecap="round"
                            />
                        );
                    })}

                    {renderMode === 'works' && connectionVertices.map((e, idx) => {
                        const a = positions[e.i];
                        const b = positions[e.j];
                        if (!a || !b) return null;
                        const size = 3 + e.sim * 3;
                        return (
                            <g key={`vx-${idx}`}>
                                <line x1={a.x} y1={a.y} x2={e.x} y2={e.y} stroke="rgba(100,116,139,0.2)" strokeWidth="0.6" />
                                <line x1={b.x} y1={b.y} x2={e.x} y2={e.y} stroke="rgba(100,116,139,0.2)" strokeWidth="0.6" />
                                <rect x={e.x - size / 2} y={e.y - size / 2} width={size} height={size} rx="1.2" fill="rgba(15,23,42,0.28)" />
                                <text
                                    x={e.x + 5}
                                    y={e.y - 4}
                                    fontSize={Math.max(6.2, 7 / Math.max(1, viewState.scale))}
                                    fontFamily="Assistant, sans-serif"
                                    fill="#64748b"
                                    opacity="0.9"
                                    style={{ pointerEvents: 'none' }}>
                                    {e.label.length > 22 ? e.label.slice(0, 22) + '…' : e.label}
                                </text>
                            </g>
                        );
                    })}

                    {positions.map((p, i) => {
                        if (!p) return null;
                        const ms = mssData[i];
                        const isHover = hoveredIdx === i;
                        const isSelected = selectedIdx === i;
                        const color = nodeColor(i);
                        const r = nodeRadius(i);
                        const opac = nodeOpacity(i);
                        const label = `${shortLib(ms.library || '').trim() || ms.library}${ms.number ? ` · ${ms.number}` : ''}`;
                        return (
                            <g
                                key={ms.id}
                                transform={`translate(${p.x},${p.y})`}
                                onMouseEnter={() => setHoveredIdx(i)}
                                onMouseLeave={() => setHoveredIdx(null)}
                                onClick={() => setSelectedIdx(prev => prev === i ? null : i)}
                                style={{ cursor: 'pointer' }}>
                                <circle r={r + (isSelected ? 3.6 : isHover ? 2.2 : 0)} fill={color} opacity={isSelected ? 0.26 : 0.16} />
                                <circle r={r} fill={color} stroke="white" strokeWidth="1" opacity={opac} />
                                <text
                                    x={7}
                                    y={-6}
                                    fontSize={(isHover || isSelected ? 1.14 : 1) * labelFontSize(viewState.scale)}
                                    fontFamily="Assistant, sans-serif"
                                    fontWeight={isHover || isSelected ? 600 : 500}
                                    fill={isHover || isSelected ? '#0f172a' : '#475569'}
                                    stroke="rgba(255,255,255,0.95)"
                                    strokeWidth="2.3"
                                    paintOrder="stroke"
                                    opacity={0.95}
                                    style={{ pointerEvents: 'none' }}>
                                    {label.length > 28 ? label.slice(0, 28) + '…' : label}
                                </text>
                            </g>
                        );
                    })}
                    </g>
                </svg>

                {hoveredMs && (
                    <div
                        className="pointer-events-none absolute z-50 bg-white/95 backdrop-blur rounded-xl shadow-xl border border-slate-100 px-3 py-2.5 text-xs"
                        style={{
                            left: tipPos.x + 16,
                            top: tipPos.y - 14,
                            maxWidth: 280,
                            borderTop: `3px solid ${nodeColor(hoveredIdx)}`,
                        }}>
                        <div className="font-semibold text-slate-800 leading-snug">{hoveredMs.library}</div>
                        {hoveredMs.number && <div className="text-slate-500 text-[10px] mt-0.5">{hoveredMs.number}</div>}
                        <div className="text-slate-600 text-[10px] mt-1 font-medium">
                            {lang === 'en' ? 'Works in inventory' : 'חיבורים במצאי'}: {(hoveredMs.works || []).length} / {maxInventory}
                        </div>
                        <div className="text-slate-400 text-[10px] mt-0.5">
                            {hoveredMs.year ? `${lang === 'en' ? 'Year' : 'שנה'}: ${hoveredMs.year}` : ''}
                            {hoveredMs.century ? ` · ${lang === 'en' ? 'Century' : 'מאה'}: ${hoveredMs.century}` : ''}
                            {hoveredMs.scriptType ? ` · ${lang === 'en' ? 'Script' : 'כתיבה'}: ${hoveredMs.scriptType}` : ''}
                        </div>
                    </div>
                )}

                {selectedMs && (
                    <div className="absolute top-3 left-3 w-[320px] max-h-[88%] overflow-auto z-40 rounded-xl border border-slate-200 bg-white/95 backdrop-blur shadow-lg">
                        <div className="px-3 py-2 border-b border-slate-100 bg-slate-50 sticky top-0">
                            <div className="text-[10px] text-slate-400 uppercase tracking-wide">{lang === 'en' ? 'Selected manuscript' : 'כתב יד נבחר'}</div>
                            <div className="text-sm font-semibold text-slate-800 mt-0.5 leading-snug">{selectedMs.library}</div>
                            <div className="text-[11px] text-slate-500">{selectedMs.number}</div>
                        </div>
                        <div className="px-3 py-2 border-b border-slate-100 text-[11px] text-slate-600">
                            {lang === 'en' ? 'Nearest manuscripts by weighted proximity' : 'כתבי יד קרובים לפי מדד קרבה משוקלל'}
                        </div>
                        <div className="p-2 space-y-2">
                            {selectedNeighbours.length === 0 ? (
                                <div className="text-[11px] text-slate-400 p-2">{lang === 'en' ? 'No similar manuscripts under current setup.' : 'לא נמצאו כתבי יד קרובים בהגדרות הנוכחיות.'}</div>
                            ) : selectedNeighbours.map(row => (
                                <div key={row.idx} className="rounded-lg border border-slate-200 bg-white p-2">
                                    <div className="flex items-center justify-between gap-2">
                                        <div>
                                            <div className="text-[11px] font-semibold text-slate-800 leading-tight">{shortLib(row.ms.library)}</div>
                                            <div className="text-[10px] text-slate-500">{row.ms.number}</div>
                                        </div>
                                        <span className={`text-[10px] rounded px-1.5 py-0.5 ${row.sim > 0.82 ? 'bg-emerald-100 text-emerald-700' : row.sim > 0.62 ? 'bg-amber-100 text-amber-700' : 'bg-rose-100 text-rose-700'}`}>
                                            {Math.round(row.sim * 100)}%
                                        </span>
                                    </div>
                                    <div className="mt-1 text-[10px] text-slate-500" dir="ltr">
                                        inventory {Math.round(row.inv * 100)}%
                                        {useBiblio ? ` · biblio ${row.bio == null ? 'N/A' : Math.round(row.bio * 100) + '%'}` : ''}
                                        {useOrder ? ` · order ${row.ord == null ? 'N/A' : Math.round(row.ord * 100) + '%'}` : ''}
                                    </div>
                                    {row.identicalInventory && (
                                        <div className="mt-1 text-[10px] inline-block rounded px-1.5 py-0.5 bg-indigo-100 text-indigo-700">
                                            {lang === 'en' ? 'Identical inventory profile' : 'זהה במצאי החיבורים'}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {showMethod && (
                    <div className="absolute top-3 right-3 z-40 w-[340px] rounded-xl border border-slate-200 bg-white shadow-lg p-3 text-[11px] text-slate-600 leading-relaxed">
                        <div className="font-semibold text-slate-800 mb-1">{lang === 'en' ? 'How this works' : 'מה זה ואיך עשינו את זה'}</div>
                        <div>
                            {lang === 'en'
                                ? 'Each circle is a manuscript. Link score is based on shared works (Jaccard), optionally enriched with bibliographic similarity and story-order similarity using the sliders. In "Include work names" mode, square markers represent shared-work connectors between manuscript pairs.'
                                : 'כל עיגול הוא כתב יד. ציון הקשר מבוסס על חפיפת חיבורים (Jaccard), וניתן להעשיר אותו בפרטים ביבליוגרפיים ובמדד סדר סיפורים באמצעות הסליידרים. במצב "כולל שמות חיבורים" ריבועים קטנים מייצגים צמתי-קשר בין זוגות כתבי יד עם תווית חיבורים משותפים.'}
                        </div>
                    </div>
                )}
            </div>

            <div className="px-3 py-2 border-t border-slate-200 bg-slate-50 text-[11px] text-slate-500 leading-relaxed">
                {lang === 'en'
                    ? `Names are always visible (library + shelfmark). Mouse wheel zooms in/out; drag to pan. Set threshold to 0 to hide lines. Bubble size and intensity = inventory depth (${minInventory}–${maxInventory} works).`
                    : `שמות כתבי היד מוצגים תמיד. גלילת עכבר מבצעת זום וגרירה מזיזה את המפה. גודל העיגול ועוצמת הצבע = מספר חיבורים במצאי (${minInventory}–${maxInventory}).`}
            </div>
        </div>
    );
}

/* ═══════════════════════════════════════════════════════════
   TAB 2 — STORY ORDER MATRIX

   Rows = canonical story numbers (צרפתי), sorted 1…N
   Columns = each MS that appears in the Igeret data
   Cell value = position of that story in that specific MS
               (מספר סדר בכתב היד),  "·" = absent
═══════════════════════════════════════════════════════════ */
function StoryOrderTab({ orderData, allStories = [], lang, onOpenTextStory, storiesWithFullText = [] }) {
    const [search, setSearch] = useState('');
    const [sortKey, setSortKey] = useState('storyNum');
    const [sortDir, setSortDir] = useState('asc');
    const [weightOrder, setWeightOrder] = useState(0.55);
    const [weightCoverage, setWeightCoverage] = useState(0.30);
    const [weightAdditions, setWeightAdditions] = useState(0.15);
    const [additionsPenaltyStrength, setAdditionsPenaltyStrength] = useState(1);

    const msList = useMemo(() => {
        const seen = new Set();
        const out = [];
        orderData.forEach(r => {
            const key = msKey(r.library, r.number);
            if (!r.library && !r.number) return;
            if (seen.has(key)) return;
            seen.add(key);
            out.push({ key, library: r.library, number: r.number, msName: r.msName || '', version: r.version || '1' });
        });
        out.sort((a, b) => (a.library || '').localeCompare(b.library || '', 'he') || (a.number || '').localeCompare(b.number || '', 'he'));
        return out;
    }, [orderData]);

    const shownMs = useMemo(() => {
        if (!search) return msList;
        const q = search.toLowerCase();
        return msList.filter(ms =>
            (ms.library || '').toLowerCase().includes(q) ||
            (ms.number || '').toLowerCase().includes(q)
        );
    }, [msList, search]);

    const storyNameByNum = useMemo(() => {
        const m = {};
        orderData.forEach(r => {
            if (r.sarfattiNum == null || r.sarfattiNum <= 0) return;
            const name = (r.storyName || r.storyNameRaw || r.incipit || '').trim();
            if (!name) return;
            if (!m[r.sarfattiNum]) m[r.sarfattiNum] = name;
        });
        return m;
    }, [orderData]);

    const canonStories = useMemo(() => {
        if (allStories && allStories.length > 0) {
            return allStories
                .filter(s => s.sarfattiNum != null && s.sarfattiNum > 0)
                .sort((a, b) => a.sarfattiNum - b.sarfattiNum)
                .map(s => ({
                    num: s.sarfattiNum,
                    name: s.storyName || `${lang === 'en' ? 'Story' : 'סיפור'} ${s.sarfattiNum}`,
                    note: s.note || '',
                }));
        }
        // fallback: derive from orderData
        const nums = [...new Set(orderData.map(r => r.sarfattiNum).filter(n => n != null && n > 0))]
            .sort((a, b) => a - b);
        return nums.map(num => ({ num, name: storyNameByNum[num] || `${lang === 'en' ? 'Story' : 'סיפור'} ${num}`, note: '' }));
    }, [allStories, orderData, storyNameByNum, lang]);

    const matrix = useMemo(() => {
        const m = {};
        orderData.forEach(r => {
            if (r.sarfattiNum == null || r.sarfattiNum <= 0) return;
            if (!m[r.sarfattiNum]) m[r.sarfattiNum] = {};
            m[r.sarfattiNum][msKey(r.library, r.number)] = {
                msOrder: r.msOrder,
                folio: r.folio,
                note: r.note,
                storyName: r.storyName,
                incipit: r.incipit,
            };
        });
        return m;
    }, [orderData]);

    const orderVectors = useMemo(() => {
        const out = {};
        orderData.forEach(r => {
            if (r.sarfattiNum == null || r.sarfattiNum <= 0 || r.msOrder == null) return;
            const key = msKey(r.library, r.number);
            if (!out[key]) out[key] = {};
            out[key][r.sarfattiNum] = r.msOrder;
        });
        return out;
    }, [orderData]);

    const baseline = useMemo(() => {
        const b = {};
        canonStories.forEach(s => { b[s.num] = s.num; });
        return b;
    }, [canonStories]);

    const additionsByMs = useMemo(() => {
        const m = {};
        orderData.forEach(r => {
            const key = msKey(r.library, r.number);
            if (!m[key]) m[key] = [];
            if (r.sarfattiNum != null && r.sarfattiNum > 0) return;
            m[key].push(r);
        });
        return m;
    }, [orderData]);

    const maxAdditions = useMemo(() => {
        return Math.max(1, ...Object.values(additionsByMs).map(arr => arr.length));
    }, [additionsByMs]);

    const msMetrics = useMemo(() => {
        const wSum = Math.max(0.0001, weightOrder + weightCoverage + weightAdditions);
        return shownMs.map(ms => {
            const vec = orderVectors[ms.key] || {};
            const rel = orderSimilarity(vec, baseline);
            const coverage = canonStories.length ? rel.overlap / canonStories.length : 0;
            const additions = additionsByMs[ms.key]?.length || 0;
            const additionsPenalty = Math.min(1, (additions / maxAdditions) * additionsPenaltyStrength);
            const additionsScore = 1 - additionsPenalty;
            const weighted = (
                (weightOrder * rel.similarity) +
                (weightCoverage * coverage) +
                (weightAdditions * additionsScore)
            ) / wSum;
            return {
                ...ms,
                orderSim: rel.similarity,
                overlap: rel.overlap,
                coverage,
                additions,
                additionsScore,
                weighted,
            };
        }).sort((a, b) => b.weighted - a.weighted || b.orderSim - a.orderSim || (a.library || '').localeCompare(b.library || '', 'he'));
    }, [shownMs, orderVectors, baseline, canonStories.length, additionsByMs, maxAdditions, additionsPenaltyStrength, weightOrder, weightCoverage, weightAdditions]);

    const storyRows = useMemo(() => {
        return canonStories.map(st => {
            let presentCount = 0;
            let absDeltaSum = 0;
            let maxAbsDelta = 0;
            const cellsByMs = {};

            shownMs.forEach(ms => {
                const cell = matrix[st.num]?.[ms.key] || null;
                const msOrder = cell?.msOrder ?? null;
                const delta = msOrder == null ? null : (msOrder - st.num);
                if (msOrder != null) {
                    presentCount += 1;
                    const ad = Math.abs(delta || 0);
                    absDeltaSum += ad;
                    if (ad > maxAbsDelta) maxAbsDelta = ad;
                }
                cellsByMs[ms.key] = {
                    msOrder,
                    delta,
                    folio: cell?.folio || '',
                    note: cell?.note || '',
                    incipit: cell?.incipit || '',
                };
            });

            const coverage = shownMs.length ? presentCount / shownMs.length : 0;
            const avgAbsDelta = presentCount ? absDeltaSum / presentCount : null;
            return {
                num: st.num,
                name: st.name,
                note: st.note || '',
                cellsByMs,
                presentCount,
                coverage,
                avgAbsDelta,
                maxAbsDelta,
            };
        });
    }, [canonStories, shownMs, matrix]);

    const sortedStoryRows = useMemo(() => {
        const rows = [...storyRows];
        const dir = sortDir === 'asc' ? 1 : -1;
        rows.sort((a, b) => {
            let cmp = 0;

            if (sortKey === 'storyNum') {
                cmp = a.num - b.num;
            } else if (sortKey === 'storyName') {
                cmp = a.name.localeCompare(b.name, 'he');
            } else if (sortKey === 'coverage') {
                cmp = a.coverage - b.coverage;
            } else if (sortKey === 'avgAbsDelta') {
                const av = a.avgAbsDelta == null ? Number.POSITIVE_INFINITY : a.avgAbsDelta;
                const bv = b.avgAbsDelta == null ? Number.POSITIVE_INFINITY : b.avgAbsDelta;
                cmp = av - bv;
            } else if (sortKey.startsWith('ms:')) {
                const key = sortKey.slice(3);
                const av = a.cellsByMs[key]?.msOrder;
                const bv = b.cellsByMs[key]?.msOrder;
                const aMissing = av == null;
                const bMissing = bv == null;
                if (aMissing && bMissing) cmp = 0;
                else if (aMissing) cmp = 1;
                else if (bMissing) cmp = -1;
                else cmp = av - bv;
                cmp *= dir;
                if (cmp !== 0) return cmp;
                return a.num - b.num;
            }

            cmp *= dir;
            if (cmp !== 0) return cmp;
            return a.num - b.num;
        });
        return rows;
    }, [storyRows, sortKey, sortDir]);

    const additionsSummary = useMemo(() => {
        return shownMs.map(ms => ({
            ...ms,
            additions: additionsByMs[ms.key]?.length || 0,
        })).sort((a, b) => b.additions - a.additions || (a.library || '').localeCompare(b.library || '', 'he'));
    }, [shownMs, additionsByMs]);

    const toggleSort = key => {
        if (sortKey === key) {
            setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
            return;
        }
        setSortKey(key);
        setSortDir('asc');
    };

    const sortMark = key => {
        if (sortKey !== key) return '↕';
        return sortDir === 'asc' ? '▲' : '▼';
    };

    const deltaCellStyle = delta => {
        if (delta == null) return 'bg-slate-50 text-slate-300';
        const ad = Math.abs(delta);
        if (ad >= 5) return 'bg-rose-300 text-rose-900 ring-1 ring-rose-400';
        if (ad >= 3) return 'bg-rose-200 text-rose-800 ring-1 ring-rose-300';
        if (ad === 0) return 'bg-emerald-100 text-emerald-800';
        return 'bg-amber-100 text-amber-800';
    };

    const fullTextStoriesSet = useMemo(() => new Set(storiesWithFullText || []), [storiesWithFullText]);

    if (!orderData.length) return (
        <div className="flex items-center justify-center h-full text-slate-400 text-sm">
            אין נתוני סדר סיפורים זמינים
        </div>
    );

    return (
        <div className="flex flex-col h-full overflow-hidden">
            <div className="px-3 py-2 border-b border-slate-200 bg-slate-50 flex flex-wrap gap-2 items-center shrink-0">
                <input
                    className="border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 min-w-[220px] bg-white flex-1"
                    placeholder={lang === 'en' ? 'Filter manuscripts...' : 'סנן כתבי יד...'}
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                />
                <span className="text-[11px] text-slate-500">
                    {lang === 'en'
                        ? 'Wide view: all manuscripts appear as columns. Click any column header to sort.'
                        : 'תצוגה רחבה: כל כתבי היד מופיעים כעמודות. לחיצה על כותרת עמודה ממיינת.'}
                </span>
            </div>

            <div className="px-3 py-2 border-b border-slate-200 bg-blue-50 text-xs text-slate-600 leading-relaxed shrink-0">
                <strong>{lang === 'en' ? 'Baseline:' : 'בסיס:'}</strong>{' '}
                {lang === 'en'
                    ? 'Sarfatti story numbering and names. Every manuscript is compared to this baseline to show story migration, omissions, and additions.'
                    : 'מספור ושמות הסיפורים אצל צרפתי. כל כתב יד מושווה לבסיס הזה כדי לראות נדידת סיפורים, השמטות ותוספות.'}
            </div>

            <div className="overflow-auto flex-1 p-3 space-y-3">
                <div className="rounded-xl border border-slate-200 overflow-auto bg-white">
                    <table className="text-xs border-collapse" style={{ minWidth: `${Math.max(1150, 590 + shownMs.length * 90)}px` }}>
                        <thead className="sticky top-0 z-20 bg-slate-800 text-white">
                            <tr>
                                <th className="px-2 py-2 text-center border-l border-slate-600 min-w-[52px] sticky right-0 z-30 bg-slate-900">
                                    <button onClick={() => toggleSort('storyNum')} className="w-full text-center">
                                        # {sortMark('storyNum')}
                                    </button>
                                </th>
                                <th className="px-3 py-2 text-right border-l border-slate-600 min-w-[230px] sticky right-[52px] z-30 bg-slate-900">
                                    <button onClick={() => toggleSort('storyName')} className="w-full text-right">
                                        {lang === 'en' ? 'Sarfatti story name' : 'שם הסיפור אצל צרפתי'} {sortMark('storyName')}
                                    </button>
                                </th>
                                <th className="px-2 py-2 text-right border-l border-slate-600 min-w-[170px] sticky right-[282px] z-30 bg-slate-900">
                                    {lang === 'en' ? 'Note' : 'הערה'}
                                </th>
                                <th className="px-2 py-2 text-center border-l border-slate-600 min-w-[76px] sticky right-[452px] z-30 bg-slate-900">
                                    <button onClick={() => toggleSort('coverage')} className="w-full text-center">
                                        {lang === 'en' ? 'Coverage' : 'כיסוי'} {sortMark('coverage')}
                                    </button>
                                </th>
                                <th className="px-2 py-2 text-center border-l border-slate-600 min-w-[76px] sticky right-[528px] z-30 bg-slate-900">
                                    <button onClick={() => toggleSort('avgAbsDelta')} className="w-full text-center">
                                        |Δ| {sortMark('avgAbsDelta')}
                                    </button>
                                </th>
                                {shownMs.map(ms => (
                                    <th key={`h-${ms.key}`} className="px-1.5 py-2 text-center border-l border-slate-600 min-w-[90px]">
                                        <button onClick={() => toggleSort(`ms:${ms.key}`)} className="w-full text-center">
                                            <div className="text-[10px] leading-tight font-semibold">{ms.msName || shortLib(ms.library)}</div>
                                            {ms.version && ms.version !== '1' && (
                                                <div className="text-[9px] text-amber-300 mt-0.5">{lang === 'en' ? `ver. ${ms.version}` : `גרסה ${ms.version}`}</div>
                                            )}
                                            <div className="text-[9px] text-slate-300 mt-0.5">{ms.number}</div>
                                            <div className="text-[10px] mt-0.5">{sortMark(`ms:${ms.key}`)}</div>
                                        </button>
                                    </th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {sortedStoryRows.map(row => {
                                const hasFullText = fullTextStoriesSet.has(row.num);
                                return (
                                    <tr key={row.num} className="border-b border-slate-100 hover:bg-indigo-50">
                                        <td className="px-2 py-1.5 text-center text-slate-600 font-mono border-l border-slate-100 sticky right-0 z-10 bg-white">{row.num}</td>
                                        <td className="px-3 py-1.5 text-right heb border-l border-slate-100 sticky right-[52px] z-10 bg-white">
                                            <div>{row.name}</div>
                                            {hasFullText && (
                                                <button
                                                    onClick={() => onOpenTextStory && onOpenTextStory(row.num)}
                                                    className="text-[10px] text-indigo-600 hover:text-indigo-800 hover:underline mt-0.5"
                                                    title={lang === 'en' ? 'Open synopsis in Texts tab' : 'פתח את הסינופסיס בלשונית הטקסטים'}>
                                                    {lang === 'en' ? 'Synopsis' : 'לסינופסיס'}
                                                </button>
                                            )}
                                        </td>
                                        <td className="px-2 py-1.5 text-right heb border-l border-slate-100 text-slate-600 sticky right-[282px] z-10 bg-white text-[11px] leading-snug">
                                            {row.note || ''}
                                        </td>
                                        <td className="px-2 py-1.5 text-center border-l border-slate-100 text-slate-600 sticky right-[452px] z-10 bg-white">
                                            {row.presentCount}/{shownMs.length}
                                        </td>
                                        <td className="px-2 py-1.5 text-center border-l border-slate-100 text-slate-700 sticky right-[528px] z-10 bg-white">
                                            {row.avgAbsDelta == null ? '·' : row.avgAbsDelta.toFixed(1)}
                                        </td>
                                        {shownMs.map(ms => {
                                            const cell = row.cellsByMs[ms.key];
                                            const cls = deltaCellStyle(cell.delta);
                                            const deltaText = cell.delta == null ? '·' : (cell.delta > 0 ? `+${cell.delta}` : `${cell.delta}`);
                                            const tip = cell.msOrder == null
                                                ? ''
                                                : `${lang === 'en' ? 'Order' : 'מיקום'}: ${cell.msOrder} | Δ ${deltaText}${cell.folio ? ` | ${lang === 'en' ? 'Folio' : 'עמוד'}: ${cell.folio}` : ''}${cell.note ? ` | ${cell.note}` : ''}`;
                                            return (
                                                <td key={`${row.num}-${ms.key}`} className="px-1 py-1.5 text-center border-l border-slate-100" title={tip}>
                                                    <div className={`rounded px-1 py-0.5 ${cls}`}>
                                                        <div className="font-semibold leading-tight">{cell.msOrder ?? '·'}</div>
                                                        <div className="text-[9px] leading-tight">{deltaText}</div>
                                                    </div>
                                                </td>
                                            );
                                        })}
                                    </tr>
                                );
                            })}
                            {shownMs.length === 0 && (
                                <tr>
                                    <td colSpan={Math.max(5, 5 + shownMs.length)} className="px-3 py-4 text-center text-slate-400">
                                        {lang === 'en' ? 'No manuscripts match the filter.' : 'אין כתבי יד התואמים את הסינון.'}
                                    </td>
                                </tr>
                            )}
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    );
}

/* ═══════════════════════════════════════════════════════════
   TAB 3 — TEXT COMPARISON

   Left sidebar: list of stories by canonical number
   Right: texts of the selected story from all MSS
═══════════════════════════════════════════════════════════ */
function TextsTab({ textsData, textsAudit, orderData, lang, jumpStory }) {
    const [textsInnerTab, setTextsInnerTab] = useState('stories'); // stories | map
    const [treeBasis, setTreeBasis] = useState('story'); // story | global | delta
    const [selectedStory, setSelectedStory] = useState(null);
    const [selectedKeys, setSelectedKeys] = useState([]);
    const [baseSynopsisKey, setBaseSynopsisKey] = useState('');
    const [treeZoom, setTreeZoom] = useState(1);
    const [msReadKey, setMsReadKey] = useState('');
    const [selectedSegIdx, setSelectedSegIdx] = useState(null);

    const storyNames = useMemo(() => {
        const m = {};
        orderData.forEach(r => {
            if (r.sarfattiNum == null) return;
            const name = (r.storyName || r.storyNameRaw || r.incipit || '').trim();
            if (!name) return;
            if (!m[r.sarfattiNum]) m[r.sarfattiNum] = name;
        });
        return m;
    }, [orderData]);

    const storyNums = useMemo(() =>
        [...new Set(textsData.map(t => t.storyNum).filter(n => n != null))].sort((a, b) => a - b),
    [textsData]);

    const msList = useMemo(() => {
        const seen = new Set();
        const out = [];
        textsData.forEach(t => {
            const key = t.key || msKey(t.library, t.number);
            if (seen.has(key)) return;
            seen.add(key);
            out.push({ key, library: t.library, number: t.number });
        });
        return out;
    }, [textsData]);

    const auditReasonRows = useMemo(() => {
        const r = textsAudit?.droppedReasons || {};
        const labels = {
            blankRow: lang === 'en' ? 'Blank rows' : 'שורות ריקות',
            missingManuscript: lang === 'en' ? 'Missing manuscript id' : 'חסר זיהוי כתב יד',
            missingStoryNum: lang === 'en' ? 'Missing story number' : 'חסר מספר סיפור',
            emptyText: lang === 'en' ? 'Empty text' : 'טקסט ריק',
        };
        return Object.keys(labels)
            .map(k => ({ key: k, label: labels[k], count: Number(r[k] || 0) }))
            .filter(x => x.count > 0);
    }, [textsAudit, lang]);

    useEffect(() => {
        setSelectedKeys(prev => {
            const valid = prev.filter(k => msList.some(m => m.key === k));
            if (valid.length) return valid;
            return msList.slice(0, Math.min(4, msList.length)).map(m => m.key);
        });
    }, [msList]);

    useEffect(() => {
        if (selectedStory == null && storyNums.length) setSelectedStory(storyNums[0]);
    }, [selectedStory, storyNums]);

    useEffect(() => {
        if (textsInnerTab === 'stories') setTreeBasis('story');
    }, [textsInnerTab, selectedStory]);
    useEffect(() => {
        if (textsInnerTab === 'map') setTreeBasis('global');
    }, [textsInnerTab]);

    useEffect(() => {
        if (jumpStory == null) return;
        const target = Number(jumpStory);
        if (!Number.isFinite(target)) return;
        setTextsInnerTab('stories');
        setSelectedStory(target);
        setSelectedSegIdx(0);
        setMsReadKey('');

        const keys = [];
        const seen = new Set();
        textsData.forEach(t => {
            if (t.storyNum !== target) return;
            if (!String(t.text || '').trim()) return;
            const key = t.key || msKey(t.library, t.number);
            if (seen.has(key)) return;
            seen.add(key);
            keys.push(key);
        });
        if (keys.length) setSelectedKeys(keys);
    }, [jumpStory, textsData]);

    const textsByMs = useMemo(() => {
        const out = {};
        textsData.forEach(t => {
            const key = t.key || msKey(t.library, t.number);
            if (!out[key]) out[key] = {};
            out[key][t.storyNum] = t.text;
        });
        return out;
    }, [textsData]);

    const selectedMs = useMemo(() =>
        msList.filter(ms => selectedKeys.includes(ms.key)),
    [msList, selectedKeys]);

    const synopsisRows = useMemo(() => {
        if (selectedStory == null) return [];
        return selectedMs
            .map(ms => ({
                ...ms,
                text: textsByMs[ms.key]?.[selectedStory] || '',
            }))
            .filter(x => x.text);
    }, [selectedStory, selectedMs, textsByMs]);

    useEffect(() => {
        if (!synopsisRows.length) {
            setBaseSynopsisKey('');
            return;
        }
        if (!baseSynopsisKey || !synopsisRows.some(r => r.key === baseSynopsisKey)) {
            setBaseSynopsisKey(synopsisRows[0].key);
        }
    }, [synopsisRows, baseSynopsisKey]);

    const synopsisByKey = useMemo(() => {
        const m = {};
        synopsisRows.forEach(r => { m[r.key] = r.text; });
        return m;
    }, [synopsisRows]);

    const synopsisSegmentsByKey = useMemo(() => {
        const m = {};
        synopsisRows.forEach(r => { m[r.key] = splitSynopsisText(r.text); });
        return m;
    }, [synopsisRows]);

    const alignedSynopsisByKey = useMemo(() => {
        const out = {};
        if (!synopsisRows.length) return out;
        const baseKey = baseSynopsisKey || synopsisRows[0]?.key;
        const baseSegs = synopsisSegmentsByKey[baseKey] || [];
        try {
            synopsisRows.forEach(r => {
                const segs = synopsisSegmentsByKey[r.key] || [];
                if (r.key === baseKey) {
                    out[r.key] = baseSegs;
                    return;
                }
                out[r.key] = alignWitnessSegmentsToBase(baseSegs, segs, r.text);
            });
        } catch (e) {
            // Safety net: if alignment fails, fall back to raw segmentation.
            synopsisRows.forEach(r => {
                out[r.key] = synopsisSegmentsByKey[r.key] || [];
            });
        }
        return out;
    }, [synopsisRows, synopsisSegmentsByKey, baseSynopsisKey]);

    const alignmentAlgoLabel = useMemo(() => {
        const hasEngine = !!window.SarfattiAlignment?.alignToBase;
        if (lang === 'en') {
            return hasEngine
                ? 'Alignment: multi-pass bidirectional DP + length-based ensemble'
                : 'Alignment: fallback DP (simple match/insert/delete scoring)';
        }
        return hasEngine
            ? 'אלגוריתם אליינמנט: עוגני מילים + יישור דינמי עם פערים (Affine Gap), דמיון Jaccard'
            : 'אלגוריתם אליינמנט: מצב חירום — יישור דינמי בסיסי';
    }, [lang]);

    const synopsisTableRows = useMemo(() => {
        if (!synopsisRows.length) return [];
        const baseKey = baseSynopsisKey || synopsisRows[0]?.key;
        const baseAligned = alignedSynopsisByKey[baseKey] || [];
        const fallbackLen = Math.max(0, ...synopsisRows.map(r => (synopsisSegmentsByKey[r.key] || []).length));
        const rowCount = Math.max(baseAligned.length, fallbackLen);
        return Array.from({ length: rowCount }, (_, segIdx) => ({
            segIdx,
            cells: synopsisRows.map(r => ({
                key: r.key,
                text: (alignedSynopsisByKey[r.key]?.[segIdx] ?? synopsisSegmentsByKey[r.key]?.[segIdx] ?? ''),
            })),
        }));
    }, [synopsisRows, synopsisSegmentsByKey, alignedSynopsisByKey, baseSynopsisKey]);

    useEffect(() => {
        if (!synopsisTableRows.length) {
            if (selectedSegIdx != null) setSelectedSegIdx(null);
            return;
        }
        if (selectedSegIdx == null || selectedSegIdx >= synopsisTableRows.length) {
            setSelectedSegIdx(0);
        }
    }, [synopsisTableRows, selectedSegIdx]);

    useEffect(() => {
        if (selectedSegIdx == null) return;
        const el = document.querySelector(`[data-seg-idx=\"${selectedSegIdx}\"]`);
        if (el && el.scrollIntoView) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }, [selectedSegIdx]);

    const baseFullDiff = useMemo(() => {
        if (!baseSynopsisKey) return [];
        const baseText = synopsisByKey[baseSynopsisKey] || '';
        return synopsisRows
            .filter(r => r.key !== baseSynopsisKey)
            .map(r => {
                const profile = textDiffProfile(baseText, r.text || '');
                const words = wordLevelWitnessDiff(baseText, r.text || '');
                return { ...r, ...profile, ...words };
            })
            .sort((a, b) => b.score - a.score);
    }, [baseSynopsisKey, synopsisByKey, synopsisRows]);

    const msSequentialRows = useMemo(() => {
        return selectedMs.map(ms => {
            const seq = storyNums
                .map(num => ({ num, text: textsByMs[ms.key]?.[num] || '' }))
                .filter(x => x.text);
            return { ...ms, seq };
        });
    }, [selectedMs, storyNums, textsByMs]);

    const msReadRow = useMemo(() => (
        msSequentialRows.find(ms => ms.key === msReadKey) || null
    ), [msSequentialRows, msReadKey]);

    useEffect(() => {
        if (msReadKey && !selectedKeys.includes(msReadKey)) setMsReadKey('');
    }, [msReadKey, selectedKeys]);

    const pairDist = useMemo(() => {
        const dStory = {};
        const dGlobal = {};
        const keyAt = idx => selectedMs[idx]?.key;
        const globalCorpus = {};
        selectedMs.forEach(ms => {
            globalCorpus[ms.key] = storyNums
                .map(num => textsByMs[ms.key]?.[num] || '')
                .filter(Boolean)
                .join(' ');
        });

        for (let i = 0; i < selectedMs.length; i++) {
            for (let j = i + 1; j < selectedMs.length; j++) {
                const ki = keyAt(i), kj = keyAt(j);
                // Use string-sorted key to match the ordering used by all getDist lookups.
                const pairKey = ki < kj ? `${ki}||${kj}` : `${kj}||${ki}`;
                let storyDist;
                if (selectedStory == null) {
                    // No specific story selected – average distance across all stories.
                    let s = 0, c = 0;
                    storyNums.forEach(n => {
                        const a = textsByMs[ki]?.[n] || '';
                        const b = textsByMs[kj]?.[n] || '';
                        if (a || b) { s += 1 - fullTextSimilarity(a, b); c++; }
                    });
                    storyDist = c ? s / c : 1;
                } else {
                    storyDist = 1 - fullTextSimilarity(
                        textsByMs[ki]?.[selectedStory] || '',
                        textsByMs[kj]?.[selectedStory] || ''
                    );
                }
                dStory[pairKey] = storyDist;
                dGlobal[pairKey] = 1 - fullTextSimilarity(globalCorpus[ki], globalCorpus[kj]);
            }
        }
        return { dStory, dGlobal };
    }, [selectedMs, selectedStory, storyNums, textsByMs]);

    const mapPairwise = useMemo(() => {
        const getDist = (ki, kj) => {
            const pair = ki < kj ? `${ki}||${kj}` : `${kj}||${ki}`;
            if (treeBasis === 'global') return pairDist.dGlobal[pair] ?? 1;
            if (treeBasis === 'delta') return Math.abs((pairDist.dStory[pair] ?? 1) - (pairDist.dGlobal[pair] ?? 1));
            return pairDist.dStory[pair] ?? 1;
        };

        return selectedMs.map((a, i) => selectedMs.map((b, j) => {
            if (i === j) return { similarity: 1, distance: 0 };
            const d = getDist(a.key, b.key);
            return { similarity: Math.max(0, 1 - d), distance: d };
        }));
    }, [selectedMs, pairDist, treeBasis]);

    const tree = useMemo(() => {
        if (selectedMs.length < 2) return null;
        const labels = selectedMs.map(ms => `${shortLib(ms.library)} (${ms.number})`);
        const getDist = (i, j) => {
            const ki = selectedMs[i].key;
            const kj = selectedMs[j].key;
            const pair = ki < kj ? `${ki}||${kj}` : `${kj}||${ki}`;
            if (treeBasis === 'global') return pairDist.dGlobal[pair] ?? 1;
            if (treeBasis === 'delta') return Math.abs((pairDist.dStory[pair] ?? 1) - (pairDist.dGlobal[pair] ?? 1));
            return pairDist.dStory[pair] ?? 1;
        };
        return buildTreeFromDistance(labels, getDist);
    }, [selectedMs, treeBasis, pairDist]);

    const dendrogram = useMemo(() => {
        if (!tree) return null;

        const leaves = [];
        const collectLeaves = node => {
            if (!node) return;
            if (node.label) {
                leaves.push(node.label);
                return;
            }
            collectLeaves(node.left);
            collectLeaves(node.right);
        };
        collectLeaves(tree);

        const leafCount = Math.max(2, leaves.length);
        const width = Math.max(820, leafCount * 170);
        const yTop = 30;
        const yLeaf = 268;
        const labelY = yLeaf + 18;
        const height = labelY + 54;
        const maxHeight = Math.max(0.001, tree.height || 1);
        const yFor = h => yTop + ((maxHeight - (h || 0)) / maxHeight) * (yLeaf - yTop);

        const xByLeaf = {};
        leaves.forEach((label, idx) => {
            xByLeaf[label] = 62 + (idx * (width - 124)) / Math.max(1, leaves.length - 1);
        });

        const branchPalette = ['#334155', '#0f766e', '#0369a1', '#6d28d9', '#be123c'];
        const segments = [];
        const nodes = [];
        const labels = [];
        const ticks = Array.from({ length: 6 }, (_, i) => {
            const h = maxHeight - (maxHeight * i) / 5;
            return { y: yFor(h), h };
        });

        const splitLabel = raw => {
            const s = String(raw || '');
            const idx = s.indexOf('(');
            if (idx < 0) return { l1: s.slice(0, 24), l2: '' };
            return {
                l1: s.slice(0, idx).trim().slice(0, 24),
                l2: s.slice(idx).trim().slice(0, 20),
            };
        };

        const layout = (node, depth = 0) => {
            if (node.label) {
                const x = xByLeaf[node.label];
                const y = yFor(0);
                labels.push({ x, y: labelY, ...splitLabel(node.label) });
                return { x, y };
            }

            const left = layout(node.left, depth + 1);
            const right = layout(node.right, depth + 1);
            const y = yFor(node.height || 0);
            const x = (left.x + right.x) / 2;
            const col = branchPalette[depth % branchPalette.length];
            const w = Math.max(1.2, 2.4 - depth * 0.2);

            segments.push({ x1: left.x, y1: left.y, x2: left.x, y2: y, col, w });
            segments.push({ x1: right.x, y1: right.y, x2: right.x, y2: y, col, w });
            segments.push({ x1: Math.min(left.x, right.x), y1: y, x2: Math.max(left.x, right.x), y2: y, col, w });
            nodes.push({ x, y, h: node.height || 0, col });

            return { x, y };
        };

        layout(tree);
        return { width, height, ticks, segments, nodes, labels, yLeaf };
    }, [tree]);

    const toggleMs = key => {
        setSelectedKeys(prev => prev.includes(key)
            ? prev.filter(x => x !== key)
            : [...prev, key]);
    };

    if (!textsData.length) return (
        <div className="h-full flex flex-col items-center justify-center gap-2 text-slate-400 text-sm">
            <div>{T('noTexts', lang)}</div>
            {textsAudit && (
                <div className="text-[11px] text-slate-500 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">
                    {lang === 'en'
                        ? `Import check: ${textsAudit.keptRows}/${textsAudit.totalRows} valid rows`
                        : `בדיקת ייבוא: ${textsAudit.keptRows}/${textsAudit.totalRows} שורות תקינות`}
                </div>
            )}
        </div>
    );

    return (
        <div className="flex h-full overflow-hidden">
            <div className="w-72 border-l border-slate-200 bg-slate-50 flex flex-col shrink-0 overflow-hidden">
                <div className="bg-slate-800 text-white text-xs font-semibold px-3 py-2.5 shrink-0">טקסטים והשוואות</div>
                <div className="p-2 border-b border-slate-200 bg-white space-y-2 shrink-0">
                    {textsAudit && (
                        <div className="rounded-md border border-slate-200 bg-slate-50 px-2 py-1.5 text-[10px] text-slate-600 leading-relaxed">
                            <div className="font-semibold text-slate-700">
                                {lang === 'en' ? 'Import audit' : 'בקרת ייבוא'}
                            </div>
                            <div>
                                {lang === 'en'
                                    ? `${textsAudit.keptRows}/${textsAudit.totalRows} rows loaded`
                                    : `${textsAudit.keptRows}/${textsAudit.totalRows} שורות נטענו`}
                            </div>
                            {auditReasonRows.length > 0 && (
                                <div>
                                    {auditReasonRows.map(r => `${r.label}: ${r.count}`).join(' | ')}
                                </div>
                            )}
                        </div>
                    )}

                    {textsInnerTab === 'stories' && (
                        <>
                            <div className="text-[10px] text-slate-500">{`\u05e1\u05d9\u05e0\u05d5\u05e4\u05e1\u05d9\u05e1 + \u05d1\u05d7\u05d9\u05e8\u05ea \u05e7\u05d8\u05e2`}</div>
                            <select value={selectedStory ?? ''}
                                onChange={e => setSelectedStory(Number(e.target.value))}
                                className="w-full border border-slate-300 rounded px-2 py-1 text-xs bg-white">
                                {storyNums.map(n => (
                                    <option key={n} value={n}>{`\u05e1\u05d9\u05e4\u05d5\u05e8 ${n} \u2014 ${storyNames[n] || ''}`}</option>
                                ))}
                            </select>
                            <select value={baseSynopsisKey}
                                onChange={e => setBaseSynopsisKey(e.target.value)}
                                className="w-full border border-slate-300 rounded px-2 py-1 text-xs bg-white">
                                {synopsisRows.map(r => (
                                    <option key={r.key} value={r.key}>{`${shortLib(r.library)} (${r.number})`}</option>
                                ))}
                            </select>
                            <select value={selectedSegIdx == null ? '' : selectedSegIdx}
                                onChange={e => setSelectedSegIdx(e.target.value === '' ? null : Number(e.target.value))}
                                className="w-full border border-slate-300 rounded px-2 py-1 text-xs bg-white">
                                <option value="">{lang === 'en' ? 'Jump to segment?' : '\u05e7\u05e4\u05d5\u05e5 \u05dc\u05e7\u05d8\u05e2\u2026'}</option>
                                {synopsisTableRows.map(row => (
                                    <option key={`seg-${row.segIdx}`} value={row.segIdx}>{`${lang === 'en' ? 'Segment' : '\u05e7\u05d8\u05e2'} ${row.segIdx + 1}`}</option>
                                ))}
                            </select>
                        </>
                    )}

                    {textsInnerTab === 'map' && (
                        <>
                            <select value={selectedStory ?? ''}
                                onChange={e => setSelectedStory(Number(e.target.value))}
                                className="w-full border border-slate-300 rounded px-2 py-1 text-xs bg-white">
                                {storyNums.map(n => (
                                    <option key={n} value={n}>{`סיפור ${n} — ${storyNames[n] || ''}`}</option>
                                ))}
                            </select>
                            <div className="text-[10px] text-slate-500 leading-relaxed">
                                כולם מול כולם מופיע כאן, יחד עם עץ הקרבה הכללי.
                            </div>
                        </>
                    )}
                </div>
